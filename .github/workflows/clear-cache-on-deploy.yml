# On every push to main (including auto-merge from fix/* or claude/*), production
# deploys (Vercel). This workflow calls GET /api/refresh so all caches are reset
# and the next request uses the new code.
#
# Requires repo secrets: PRODUCTION_URL, CRON_SECRET.
name: Clear cache on production deploy

on:
  push:
    branches: [main]

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Call /api/refresh to reset all caches
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PRODUCTION_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning:: PRODUCTION_URL or CRON_SECRET not set; skipping cache clear."
            exit 0
          fi
          url="${PRODUCTION_URL%/}/api/refresh"
          echo "Calling $url ..."
          resp=$(curl -s -w "\n%{http_code}" -X GET "$url" -H "Authorization: Bearer $CRON_SECRET" --connect-timeout 15 --max-time 60) || true
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          if [ "$code" = "200" ]; then
            echo "Cache cleared: $body"
          else
            echo "::warning:: /api/refresh returned HTTP $code: $body"
          fi
