name: Retrain NBA Models

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Run at 6 AM UTC (1 AM EST) — after all NBA games finish
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-train.txt

      - name: Retrain RS model on 3 seasons
        id: retrain_rs
        continue-on-error: true
        run: python train_lgbm.py

      - name: Retrain boost model from actuals
        id: retrain_boost
        continue-on-error: true
        run: python train_boost_lgbm.py

      - name: Retrain drafts popularity model (overlap with predictions)
        id: retrain_drafts
        continue-on-error: true
        run: python train_drafts_lgbm.py

      - name: Retrain status note (RS)
        if: steps.retrain_rs.outcome != 'success'
        run: |
          echo "::warning::Retrain skipped due to NBA API/network failure. Keeping current lgbm_model.pkl."

      - name: Retrain status note (Boost)
        if: steps.retrain_boost.outcome != 'success'
        run: |
          echo "::warning::Boost retrain skipped due to API/network/data failure. Keeping current boost_model.pkl."

      - name: Retrain status note (Drafts)
        if: steps.retrain_drafts.outcome != 'success'
        run: |
          echo "::warning::Drafts model retrain skipped or insufficient overlap. Keeping current drafts_model.pkl."

      - name: Check if either model changed
        if: steps.retrain_rs.outcome == 'success' || steps.retrain_boost.outcome == 'success' || steps.retrain_drafts.outcome == 'success'
        id: check
        run: |
          if git diff --quiet lgbm_model.pkl boost_model.pkl drafts_model.pkl 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stamp model retrain date in config
        if: (steps.retrain_rs.outcome == 'success' || steps.retrain_boost.outcome == 'success' || steps.retrain_drafts.outcome == 'success') && steps.check.outputs.changed == 'true'
        run: python scripts/bump_retrain_config.py

      - name: Bust today's slate cache on model change via API
        if: (steps.retrain_rs.outcome == 'success' || steps.retrain_boost.outcome == 'success' || steps.retrain_drafts.outcome == 'success') && steps.check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # Write bust sentinel to main via GitHub API.
          # Railway redeploys on push to main; the sentinel is data-only (no code change)
          # so Railway will redeploy but it's harmless — the new process picks up the bust.
          TODAY_ET=$(TZ='America/New_York' date +%Y-%m-%d)
          BUST_PATH="data/slate/${TODAY_ET}_bust.json"
          CONTENT=$(echo -n '{"_busted":true}' | base64)

          # Check if file already exists on main to get SHA for update
          EXISTING=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPO/contents/$BUST_PATH")
          SHA=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          PAYLOAD="{\"message\":\"bust sentinel $TODAY_ET\",\"content\":\"$CONTENT\""
          if [ -n "$SHA" ]; then
            PAYLOAD="$PAYLOAD,\"sha\":\"$SHA\""
          fi
          PAYLOAD="$PAYLOAD}"

          curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPO/contents/$BUST_PATH" \
            -d "$PAYLOAD"

      - name: Commit and push updated model + config
        if: (steps.retrain_rs.outcome == 'success' || steps.retrain_boost.outcome == 'success' || steps.retrain_drafts.outcome == 'success') && steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lgbm_model.pkl boost_model.pkl drafts_model.pkl data/model-config.json
          git commit -m "chore: daily models retrain $(date -u +%Y-%m-%d)"
          git push
