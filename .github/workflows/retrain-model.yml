name: Retrain NBA Model

on:
  schedule:
    # Run at 6 AM UTC (1 AM EST) — after all NBA games finish
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy lightgbm scikit-learn nba_api

      - name: Retrain model on 3 seasons
        run: python train_lgbm.py

      - name: Check if model changed
        id: check
        run: |
          if git diff --quiet lgbm_model.pkl 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stamp model retrain date in config
        if: steps.check.outputs.changed == 'true'
        run: python scripts/bump_retrain_config.py

      - name: Bust today's slate cache on model change (Test 2.3B)
        if: steps.check.outputs.changed == 'true'
        run: |
          # Write today's (ET) bust sentinel so the GitHub cache layer returns a miss
          # on the next slate request, forcing predictions to regenerate with the new model.
          # ET = UTC-5 in winter, UTC-4 in spring/summer (DST starts Mar 8 2026).
          TODAY_ET=$(TZ='America/New_York' date +%Y-%m-%d)
          mkdir -p data/slate
          echo '{"_busted":true}' > data/slate/${TODAY_ET}_bust.json
          git add data/slate/${TODAY_ET}_bust.json

      - name: Commit and push updated model + config
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lgbm_model.pkl data/model-config.json
          git commit -m "chore: daily model retrain $(date -u +%Y-%m-%d)"
          git push
