name: Retrain NBA Model

on:
  schedule:
    # Run at 6 AM UTC (1 AM EST) — after all NBA games finish
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy lightgbm scikit-learn nba_api

      - name: Retrain model on 3 seasons
        run: python train_lgbm.py

      - name: Check if model changed
        id: check
        run: |
          if git diff --quiet lgbm_model.pkl 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated model
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lgbm_model.pkl
          git commit -m "chore: daily model retrain $(date -u +%Y-%m-%d)"
          git push
