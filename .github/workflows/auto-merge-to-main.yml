name: Auto-merge to main

on:
  push:
    branches:
      - claude/auto-merge-to-main-ZwBZw

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --ff-only origin/claude/auto-merge-to-main-ZwBZw || \
            git merge -m "chore: auto-merge from claude/auto-merge-to-main-ZwBZw" origin/claude/auto-merge-to-main-ZwBZw
          git push origin main
