name: Sync model config on push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - '.github/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install api deps
        run: pip install numpy requests lightgbm pulp python-dotenv fastapi

      - name: Sync _CONFIG_DEFAULTS into live model-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: python scripts/sync_model_config.py

      - name: Commit updated config if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/model-config.json
          git diff --cached --quiet || git commit -m "chore: sync model config [${GITHUB_SHA::8}]"
          git push origin main || true
