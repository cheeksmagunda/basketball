[build]
builder = "DOCKERFILE"
# Only redeploy when actual code/config changes — ignore data commits (predictions, actuals, cache busts, model config)
watchPatterns = ["api/**", "index.html", "server.py", "requirements.txt", "railway.toml", "Dockerfile", "train_lgbm.py", "lgbm_model.pkl", "scripts/**", ".github/workflows/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[crons]
# Daily cache clear + auto-save locked predictions (7pm UTC / 2pm ET)
[[crons.jobs]]
schedule = "0 19 * * *"
command = "python -c \"import requests,os; requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/refresh')\""

# Slate transition prewarm (every 5 min): uses existing global slate logic to
# warm the CURRENT slate cache when the app transitions (including midnight bleed).
[[crons.jobs]]
schedule = "*/5 * * * *"
command = "python -c \"import requests,os; h={'Authorization':f'Bearer {os.environ.get(\"CRON_SECRET\",\"\")}'};requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/prewarm-current-slate',headers=h)\""

# Auto-tune model if ≥3% MAE improvement (Wed + Sun, 9am UTC)
# Reduced from daily to 2x/week — model changes don't need daily evaluation
[[crons.jobs]]
schedule = "0 9 * * 0,3"
command = "python -c \"import requests,os; h={'Authorization':f'Bearer {os.environ.get(\"CRON_SECRET\",\"\")}'};requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/lab/auto-improve',headers=h)\""

# Bookmaker odds sync — game-window hours only (2 PM - 1 AM ET = 19-06 UTC)
# Reduced from hourly (24/day) to game-window only (12/day) — saves ~50% cron compute
[[crons.jobs]]
schedule = "55 19,20,21,22,23,0,1,2,3,4,5,6 * * *"
command = "python -c \"import requests,os; requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/refresh-line-odds')\""

# Resolve line picks — game-window hours only (3 PM - 2 AM ET = 20-07 UTC)
# Reduced from hourly (24/day) to game-window only (12/day) — saves ~50% cron compute
[[crons.jobs]]
schedule = "0 20,21,22,23,0,1,2,3,4,5,6,7 * * *"
command = "python -c \"import requests,os; h={'Authorization':f'Bearer {os.environ.get(\"CRON_SECRET\",\"\")}'};requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/auto-resolve-line',headers=h)\""

# Injury check — reduced to 3 key windows (pre-tip + mid-evening + late)
# Reduced from 6/day to 3/day — saves 50% cron compute; user can check manually via Predict tab
[[crons.jobs]]
schedule = "0 18,22,2 * * *"
command = "python -c \"import requests,os; h={'Authorization':f'Bearer {os.environ.get(\"CRON_SECRET\",\"\")}'};requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/injury-check',headers=h)\""

# Weekly MAE drift check (backend-only flag + logs)
[[crons.jobs]]
schedule = "0 6 * * 1"
command = "python -c \"import requests,os; h={'Authorization':f'Bearer {os.environ.get(\"CRON_SECRET\",\"\")}'};requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/mae-drift-check',headers=h)\""

# Pre-lock parlay generation: noon ET (17:00 UTC) — well before first evening tip
# Generates parlay with real Odds API props and saves to GitHub so it survives post-lock
[[crons.jobs]]
schedule = "0 17 * * *"
command = "python -c \"import requests,os; requests.get(f'http://localhost:{os.environ.get(\"PORT\",8080)}/api/parlay-force-regenerate',timeout=120)\""
