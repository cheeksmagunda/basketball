<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="ball" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <radialGradient id="window" cx="45%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#c8d0de"/>
    </radialGradient>
  </defs>
  <!-- Ball -->
  <circle cx="50" cy="50" r="47" fill="url(#ball)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- White circle window -->
  <circle cx="50" cy="50" r="22" fill="url(#window)"/>
  <!-- 8 -->
  <text x="50" y="58" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="28" font-weight="900" fill="#060a0f">8</text>
  <!-- Glare -->
  <ellipse cx="35" cy="31" rx="9" ry="6" fill="rgba(255,255,255,0.18)" transform="rotate(-25 35 31)"/>
</svg>
