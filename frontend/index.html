<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Oracle — NBA Draft Optimizer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Oracle">
  <meta name="application-name" content="The Oracle">
  <meta name="theme-color" content="#060a0f">
  <meta property="og:title" content="The Oracle — NBA Draft Optimizer">
  <meta property="og:description" content="AI-powered NBA draft optimizer for the Real Sports App with game script analysis and calibration feedback.">
  <meta property="og:image" content="https://the-oracle.up.railway.app/oracle-ball.svg">
  <meta property="og:image:type" content="image/svg+xml">
  <meta property="og:url" content="https://the-oracle.up.railway.app">
  <link rel="icon" type="image/svg+xml" href="/oracle-ball.svg">
  <link rel="apple-touch-icon" href="/oracle-ball.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;background:#060a0f;font-family:'Barlow Condensed',sans-serif;">
  <!-- Static preloader — visible immediately, before React JS loads.
       React removes this element on mount (see App.tsx). -->
  <div id="static-preloader" style="position:fixed;inset:0;z-index:9999;background:rgba(6,10,15,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;">
    <style>
      @keyframes _spFloat{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-16px) rotate(1.5deg)}}
      @keyframes _spPulse{0%,100%{opacity:.4}50%{opacity:.8}}
      #_sp-ball{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#1e2235 0%,#090c14 60%,#030508 100%);box-shadow:0 0 0 1px rgba(255,255,255,.06),0 8px 40px rgba(0,0,0,.8),0 0 60px rgba(20,184,166,.08),inset 4px 4px 14px rgba(255,255,255,.055),inset -4px -4px 14px rgba(0,0,0,.6);position:relative;animation:_spFloat 3.2s ease-in-out infinite;flex-shrink:0}
      #_sp-ball::before{content:'';position:absolute;top:14px;left:22px;width:28px;height:16px;background:radial-gradient(ellipse,rgba(255,255,255,.18) 0%,transparent 70%);border-radius:50%;transform:rotate(-30deg)}
      #_sp-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-62%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:rgba(255,255,255,.7)}
      #_sp-win{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:70px;height:60px;display:flex;align-items:center;justify-content:center;overflow:hidden}
      #_sp-win::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,#0a1628 0%,#060a10 100%);clip-path:polygon(50% 2%,100% 100%,0% 100%);border:1px solid rgba(20,184,166,.2)}
      #_sp-txt{position:relative;z-index:1;font-size:.5rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#14b8a6;text-align:center;line-height:1.2;padding-top:20px;width:56px}
      #_sp-label{font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#5eead4;text-shadow:0 0 12px rgba(94,234,212,.4),0 0 24px rgba(94,234,212,.15);animation:_spPulse 2s ease-in-out infinite}
    </style>
    <div id="_sp-ball">
      <div id="_sp-num">8</div>
      <div id="_sp-win"><span id="_sp-txt">LOADING</span></div>
    </div>
    <span id="_sp-label">THE ORACLE</span>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
