<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Draft Optimizer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
    .wrap{max-width:580px;margin:0 auto;padding:1.5rem 1rem}
    h1{font-size:1.5rem;color:#fff;text-align:center}
    .sub{text-align:center;color:#888;font-size:.85rem;margin:.25rem 0 1.5rem}

    .section-title{font-size:1.1rem;font-weight:700;color:#fff;margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid #2a2a4a}
    .slate-info{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
    .slate-chip{background:#1e1e3a;padding:.25rem .6rem;border-radius:5px;font-size:.75rem;color:#a0a0c0}
    .slate-chip b{color:#60a5fa}

    .game-bar{display:flex;gap:.5rem;margin-bottom:1rem}
    select{flex:1;background:#141428;color:#e0e0e0;border:1px solid #2a2a4a;padding:.65rem .75rem;border-radius:8px;font-size:.95rem;appearance:none;cursor:pointer}
    select:focus{outline:none;border-color:#3b82f6}
    .btn{background:#1d4ed8;color:#fff;border:none;padding:.65rem 1.4rem;font-size:.95rem;border-radius:8px;cursor:pointer;transition:background .2s;white-space:nowrap}
    .btn:hover{background:#2563eb}
    .btn:disabled{background:#374151;cursor:not-allowed}

    .ctx{display:flex;gap:.75rem;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
    .chip{background:#1e1e3a;padding:.35rem .75rem;border-radius:6px;font-size:.8rem;color:#a0a0c0}
    .chip b{color:#60a5fa}

    .tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #2a2a4a}
    .tab{flex:1;text-align:center;padding:.6rem 0;font-size:.85rem;cursor:pointer;color:#888;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}
    .tab.active{color:#60a5fa;border-bottom-color:#3b82f6}
    .tab:hover{color:#bbb}

    .card{background:#141428;border-radius:10px;padding:.8rem 1rem;margin-bottom:.5rem;border-left:3px solid #1d4ed8;display:flex;align-items:center;gap:.75rem}
    .slot-badge{background:#1d4ed8;color:#fff;font-weight:700;font-size:.82rem;padding:.3rem .45rem;border-radius:6px;min-width:2.8rem;text-align:center;flex-shrink:0}
    .info{flex:1;min-width:0}
    .pname{font-size:1rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .game-tag{font-size:.65rem;color:#60a5fa;background:#1e1e3a;padding:.1rem .4rem;border-radius:3px;margin-left:.4rem;vertical-align:middle}
    .meta{font-size:.78rem;color:#888;margin-top:.15rem}
    .meta span{margin-right:.6rem}
    .meta .team-tag{color:#a5b4fc;font-weight:600}

    .spinner{display:none;margin:2rem auto;width:32px;height:32px;border:3px solid #333;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{text-align:center;margin-top:1.5rem;color:#888;font-size:.9rem}
    .err{color:#f87171}
    .empty{color:#666;padding:2rem 0;text-align:center}
    .divider{height:1px;background:#2a2a4a;margin:1.5rem 0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Daily Draft Optimizer</h1>
    <p class="sub">Real App — NBA Rankings</p>

    <!-- SLATE-WIDE PICKS -->
    <div class="section-title">Full Slate Top 5</div>
    <div id="slateInfo" class="slate-info"></div>
    <div class="tabs" id="slateTabs" style="display:none">
      <button class="tab active" data-t="chalk" onclick="switchSlateTab('chalk')">Chalk</button>
      <button class="tab" data-t="diff" onclick="switchSlateTab('diff')">Differentiated</button>
      <button class="tab" data-t="contra" onclick="switchSlateTab('contra')">Contrarian</button>
    </div>
    <div class="spinner" id="slateSpin" style="display:block"></div>
    <div id="slateList"></div>
    <p id="slateMsg" class="msg"></p>

    <div class="divider"></div>

    <!-- PER-GAME PICKS -->
    <div class="section-title">Single Game Picks</div>
    <div class="game-bar">
      <select id="gameSel"><option value="">Loading games...</option></select>
      <button class="btn" id="goBtn" disabled onclick="getPicks()">Get Picks</button>
    </div>

    <div id="ctx" class="ctx" style="display:none"></div>

    <div class="tabs" id="tabs" style="display:none">
      <button class="tab active" data-t="chalk" onclick="switchTab('chalk')">Chalk</button>
      <button class="tab" data-t="diff" onclick="switchTab('diff')">Differentiated</button>
      <button class="tab" data-t="contra" onclick="switchTab('contra')">Contrarian</button>
    </div>

    <div class="spinner" id="spin"></div>
    <div id="list"></div>
    <p class="msg" id="msg"></p>
  </div>

<script>
let DATA = null;
let SLATE = null;
let CUR_TAB = 'chalk';
let SLATE_TAB = 'chalk';

// --- Load games + slate on page load ---
(async function(){
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('goBtn');

  try {
    const r = await fetch('/api/games');
    const games = await r.json();
    if (games.error) { sel.innerHTML = '<option>'+games.error+'</option>'; return; }
    if (!games.length) { sel.innerHTML = '<option>No games today</option>'; return; }
    sel.innerHTML = '<option value="">Select a game...</option>';
    games.forEach(function(g) {
      const o = document.createElement('option');
      o.value = g.gameId;
      let extra = '';
      if (g.total) extra += ' | O/U '+g.total;
      if (g.spread != null) extra += ' | Spread '+g.spread;
      o.textContent = g.label + extra;
      sel.appendChild(o);
    });
    sel.onchange = function() { btn.disabled = !sel.value; };
  } catch(e) { sel.innerHTML = '<option>Failed to load games</option>'; }

  loadSlate();
})();

async function loadSlate() {
  const spin = document.getElementById('slateSpin');
  const list = document.getElementById('slateList');
  const msg = document.getElementById('slateMsg');
  const info = document.getElementById('slateInfo');
  const tabs = document.getElementById('slateTabs');

  spin.style.display = 'block';
  list.innerHTML = '';
  msg.textContent = '';

  try {
    const r = await fetch('/api/slate');
    const d = await r.json();
    if (d.error) {
      msg.innerHTML = '<span class="err">'+d.error+'</span>';
      spin.style.display = 'none';
      return;
    }

    SLATE = d;

    var chips = '<span class="slate-chip"><b>'+d.games.length+'</b> games</span>';
    chips += '<span class="slate-chip"><b>'+d.totalPlayers+'</b> players</span>';
    d.games.forEach(function(g) {
      chips += '<span class="slate-chip">'+g.label+'</span>';
    });
    info.innerHTML = chips;

    tabs.style.display = 'flex';
    SLATE_TAB = 'chalk';
    document.querySelectorAll('#slateTabs .tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.t === 'chalk');
    });
    renderLineup(d.lineups.chalk, list, true);
  } catch(e) {
    msg.innerHTML = '<span class="err">Failed to load slate picks.</span>';
  } finally {
    spin.style.display = 'none';
  }
}

function switchSlateTab(tab) {
  SLATE_TAB = tab;
  document.querySelectorAll('#slateTabs .tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.t === tab);
  });
  if (!SLATE) return;
  var map = {chalk:'chalk', diff:'differentiated', contra:'contrarian'};
  renderLineup(SLATE.lineups[map[tab]] || [], document.getElementById('slateList'), true);
}

async function getPicks() {
  var sel = document.getElementById('gameSel');
  var btn = document.getElementById('goBtn');
  var spin = document.getElementById('spin');
  var list = document.getElementById('list');
  var msg = document.getElementById('msg');
  var ctx = document.getElementById('ctx');
  var tabs = document.getElementById('tabs');

  if (!sel.value) return;
  btn.disabled = true; btn.textContent = 'Loading...';
  spin.style.display = 'block'; list.innerHTML = ''; msg.textContent = '';
  ctx.style.display = 'none'; tabs.style.display = 'none';

  try {
    var r = await fetch('/api/picks?gameId=' + encodeURIComponent(sel.value));
    var d = await r.json();
    if (d.error) { msg.innerHTML = '<span class="err">'+d.error+'</span>'; return; }

    DATA = d;
    var g = d.game;
    var chipHtml = '<div class="chip"><b>'+g.home+'</b> vs <b>'+g.away+'</b></div>';
    if (g.total) chipHtml += '<div class="chip">O/U <b>'+g.total+'</b></div>';
    if (g.spread != null) chipHtml += '<div class="chip">Spread <b>'+(g.spread > 0 ? '+' : '')+g.spread+'</b></div>';
    ctx.innerHTML = chipHtml;
    ctx.style.display = 'flex';
    tabs.style.display = 'flex';

    CUR_TAB = 'chalk';
    document.querySelectorAll('#tabs .tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.t === 'chalk');
    });
    renderLineup(d.lineups.chalk, list, false);
  } catch(e) {
    msg.innerHTML = '<span class="err">Failed to fetch picks. Try again.</span>';
  } finally {
    btn.disabled = false; btn.textContent = 'Get Picks';
    spin.style.display = 'none';
  }
}

function switchTab(tab) {
  CUR_TAB = tab;
  document.querySelectorAll('#tabs .tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.t === tab);
  });
  if (!DATA) return;
  var map = {chalk:'chalk', diff:'differentiated', contra:'contrarian'};
  renderLineup(DATA.lineups[map[tab]] || [], document.getElementById('list'), false);
}

function renderLineup(picks, container, showGame) {
  if (!picks || !picks.length) { container.innerHTML = '<div class="empty">No picks available</div>'; return; }
  container.innerHTML = picks.map(function(p) {
    var gameTag = (showGame && p.game) ? '<span class="game-tag">'+p.game+'</span>' : '';
    return '<div class="card">' +
      '<div class="slot-badge">'+(p.slot || '')+'</div>' +
      '<div class="info">' +
        '<div class="pname">'+p.name+gameTag+'</div>' +
        '<div class="meta">' +
          '<span class="team-tag">'+(p.team || '')+'</span>' +
          '<span>'+(p.pos || '')+'</span>' +
          '<span>'+p.predMin+' min</span>' +
          '<span>Form x'+p.form+'</span>' +
          '<span>Matchup x'+p.matchup+'</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}
</script>
</body>
</html>
