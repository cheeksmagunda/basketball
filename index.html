const LAB = {
  messages: [],       // conversation history
  system: '',         // dynamic system prompt
  briefing: null,     // latest briefing
  config: null,       // current config
  lineData: null,     // today's Line of the Day
  slateData: null,    // today's slate projections
  initialized: false,
  initAt: 0,          // timestamp of last init (ms)
  _lockPoll: null,    // setInterval id for locked-state polling
};

async function initLabPage() {
  // Re-check status if tab revisited after 10+ minutes (lock state may have changed)
  const stale = Date.now() - LAB.initAt > 10 * 60 * 1000;
  if (LAB.initialized && !stale) return;
  LAB.initialized = true;
  LAB.initAt = Date.now();
  // Clear prior messages on stale re-init (lock state may have changed)
  if (stale) {
    LAB.messages = [];
    document.getElementById('labMessages').innerHTML = '';
  }

  document.getElementById('labLoading').style.display = 'block';
  document.getElementById('labLocked').style.display   = 'none';
  document.getElementById('labUnlocked').style.display = 'none';

  try {
    const r = await fetch('/api/lab/status');
    const status = await r.json();
    document.getElementById('labLoading').style.display = 'none';

    if (status.locked) {
      showLabLocked(status);
    } else {
      await showLabUnlocked(status);
    }
  } catch(e) {
    document.getElementById('labLoading').style.display = 'none';
    document.getElementById('labUnlocked').style.display = 'flex';
    appendLabMessage('assistant', 'Could not connect to the Lab backend. Make sure the API is running.');
  }
}

function _updateLabLockedStatus(status) {
  document.getElementById('labLockedReason').textContent = status.reason || 'Lab locked';
  const estUnlock = status.estimated_unlock
    ? 'Estimated unlock: ' + new Date(status.estimated_unlock).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    : (status.next_lock_time ? 'Locks at ' + new Date(status.next_lock_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '');
  document.getElementById('labLockedUnlock').textContent = estUnlock;
}

function showLabLocked(status) {
  document.getElementById('labLocked').style.display = 'block';
  _updateLabLockedStatus(status);

  // Show config changelog read-only
  fetch('/api/lab/config-history').then(r=>r.json()).then(data => {
    const el = document.getElementById('labLockedConfig');
    const changelog = (data.changelog || []).slice().reverse().slice(0,5);
    el.innerHTML = '<div class="lab-config-card"><div class="lab-config-label">Config v' + data.version + ' \xb7 Changelog</div>'
      + changelog.map(c => '<div class="lab-changelog-item"><span class="lab-changelog-ver">v' + c.version + '</span>'
        + '<span style="color:var(--muted);font-size:0.65rem">' + c.date + '</span>'
        + '<br><span>' + c.change + '</span></div>').join('')
      + '</div>';
  }).catch(function() {});

  // Poll every 3 min while locked: update games remaining + unlock estimate,
  // and automatically flip to unlocked view when all games finish.
  if (LAB._lockPoll) clearInterval(LAB._lockPoll);
  LAB._lockPoll = setInterval(function() {
    if (document.getElementById('labLocked').style.display === 'none') {
      clearInterval(LAB._lockPoll); LAB._lockPoll = null; return;
    }
    fetch('/api/lab/status').then(function(r) { return r.json(); }).then(async function(s) {
      if (!s.locked) {
        clearInterval(LAB._lockPoll); LAB._lockPoll = null;
        LAB.initialized = false;
        document.getElementById('labLocked').style.display = 'none';
        document.getElementById('labLoading').style.display = 'block';
        await showLabUnlocked(s);
        document.getElementById('labLoading').style.display = 'none';
      } else {
        _updateLabLockedStatus(s);
      }
    }).catch(function() {});
  }, 3 * 60 * 1000);
}

async function showLabUnlocked(status) {
  document.getElementById('labUnlocked').style.display = 'flex';

  // Load briefing + config + line data + slate in parallel (silently)
  const [briefingRes, configRes, lineRes, slateRes] = await Promise.allSettled([
    fetch('/api/lab/briefing').then(r => r.json()),
    fetch('/api/lab/config-history').then(r => r.json()),
    fetch('/api/line-of-the-day').then(r => r.json()),
    fetch('/api/slate').then(r => r.json()),
  ]);

  if (briefingRes.status === 'fulfilled') LAB.briefing  = briefingRes.value;
  if (configRes.status === 'fulfilled')   LAB.config    = configRes.value;
  if (lineRes.status === 'fulfilled')     LAB.lineData  = lineRes.value;
  if (slateRes.status === 'fulfilled')    LAB.slateData = slateRes.value;

  // Build system prompt (context is ready; user starts the conversation)
  LAB.system = buildLabSystemPrompt();

  // Auto-prompt upload only when games have actually finished today (not pre-game)
  if (LAB.messages.length === 0 && LAB.slateData?.games?.length && status.games_final > 0) {
    _renderBenEodPrompt();
  }
}

function buildLabSystemPrompt() {
  const briefStr = LAB.briefing ? JSON.stringify(LAB.briefing, null, 2) : 'No briefing available yet.';
  const cfgStr   = LAB.config   ? JSON.stringify(LAB.config.config || LAB.config, null, 2) : 'Config unavailable.';
  const lineStr  = LAB.lineData
    ? (() => {
        const p = LAB.lineData.pick;
        if (!p) return 'No line pick available today.';
        return `Player: ${p.player_name} (${p.team})
Bet: ${p.direction} ${p.line} ${p.stat_type}
Projection: ${p.projection} | Edge: ${p.edge > 0 ? '+' : ''}${p.edge}
Confidence: ${p.confidence}/100
Narrative: ${p.narrative || 'N/A'}`;
      })()
    : 'Line data unavailable.';

  const slateStr = (() => {
    const s = LAB.slateData;
    if (!s || !s.lineups) return 'Slate not loaded yet.';
    const chalk  = s.lineups.chalk  || [];
    const upside = s.lineups.upside || [];
    const games  = (s.games || [])
      .filter(g => !g.completed)
      .map(g => `  ${g.away?.abbr || '?'} @ ${g.home?.abbr || '?'}${g.spread != null ? ` (spread ${g.spread > 0 ? '+' : ''}${g.spread}, O/U ${g.total})` : ''}`)
      .join('\n');

    const fmtPlayer = (p, i) => {
      const stats = [
        p.pts  != null ? `${parseFloat(p.pts).toFixed(1)}pts` : null,
        p.reb  != null ? `${parseFloat(p.reb).toFixed(1)}reb` : null,
        p.ast  != null ? `${parseFloat(p.ast).toFixed(1)}ast` : null,
      ].filter(Boolean).join('/');
      const boost = p.est_mult != null ? ` | boost ${parseFloat(p.est_mult).toFixed(2)}x` : '';
      const mins  = p.predMin  != null ? ` | ${parseFloat(p.predMin).toFixed(0)}min` : '';
      return `  ${i+1}. ${p.name} (${p.team}, ${p.pos}) — RS: ${parseFloat(p.rating||0).toFixed(1)}${stats ? `, ${stats}` : ''}${mins}${boost}`;
    };

    return `Date: ${s.date}
Games:
${games || '  (none)'}

CHALK LINEUP (Starting 5 — highest projected value):
${chalk.map(fmtPlayer).join('\n') || '  (none)'}

MOONSHOT LINEUP (High-upside plays):
${upside.map(fmtPlayer).join('\n') || '  (none)'}`;
  })();

  return `You are Ben — the Oracle's autonomous NBA analytics and engineering assistant.
You have full context on today's slate and full authority to improve the system.

YOUR CAPABILITIES:
- Answer any question about today's games, players, or picks
- Read any file in the repo: api/index.py, api/real_score.py, api/line_engine.py, api/asset_optimizer.py, index.html, data/predictions/*.csv, data/actuals/*.csv, data/audit/*.json
- List directories to discover available data files
- Modify code files directly and commit to GitHub — changes to api/*.py or index.html trigger automatic Vercel redeploy (~2 min)
- Run backtests to validate config changes before applying
- Apply config changes (parameters in data/model-config.json)
- Analyze raw prediction and actuals CSVs to identify patterns the briefing might miss

CODE CHANGE AUTHORITY:
You CAN modify api/index.py, api/real_score.py, api/line_engine.py, api/asset_optimizer.py, api/rotowire.py, and index.html.
Use this for algorithmic improvements: projection engine logic, card boost formula, moonshot ranking, lineup optimizer constraints, line engine scoring, UI fixes.
ALWAYS read the relevant function first. Make minimal, targeted changes. Explain the change before writing.
Config changes (parameters) → use update_config action. Algorithmic changes (logic, formulas) → use write_repo_file tool.

ACTIONS YOU CAN REQUEST (use JSON in <action>...</action> tags):
- backtest: {"action":"backtest","changes":{"dot.path":value},"description":"..."}
- update_config: {"action":"update_config","changes":{"dot.path":value},"description":"..."}
- show_config: {"action":"show_config"}
- show_history: {"action":"show_history"}

TODAY'S SLATE:
${slateStr}

TODAY'S LINE OF THE DAY:
${lineStr}

CURRENT MODEL CONFIG:
${cfgStr}

LATEST ACCURACY BRIEFING:
${briefStr}

BEHAVIOR:
- Be direct and concise. Answer what's asked.
- For lineup/pick questions, draw on your full context above.
- For model changes: config tweaks → backtest first. Code changes → read the function, explain the change, then write.
- After a code write, tell the user deploy is in progress (~2 min) and what to expect.
- No unsolicited introductions or summaries.`;
}

async function labCallClaude() {
  const thinkId = 'lab-think-' + Date.now();
  const thinkEl = document.createElement('div');
  thinkEl.id = thinkId;
  thinkEl.className = 'lab-msg thinking';
  thinkEl.innerHTML = '<div class="lab-thinking-dots"><span></span><span></span><span></span></div>';
  const labMsgs = document.getElementById('labMessages');
  labMsgs.appendChild(thinkEl);
  labMsgs.scrollTop = labMsgs.scrollHeight;

  document.getElementById('labSendBtn').disabled = true;

  try {
    const r = await fetch('/api/lab/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // Send all messages (including hidden) — hidden = not shown in UI, but still sent to Claude
        messages: LAB.messages.map(({ role, content }) => ({ role, content })),
        system: LAB.system,
      }),
    });
    const data = await r.json();
    thinkEl.remove();

    if (data.error) {
      appendLabMessage('assistant', `Error: ${data.error}`);
      return;
    }

    const content = data.content || '';
    await handleLabResponse(content);

  } catch(e) {
    thinkEl.remove();
    appendLabMessage('assistant', 'Network error. Please try again.');
  } finally {
    document.getElementById('labSendBtn').disabled = false;
  }
}

async function handleLabResponse(content) {
  // Extract and handle any action tags
  const actionMatch = content.match(/<action>([\s\S]*?)<\/action>/);
  const displayContent = content.replace(/<action>[\s\S]*?<\/action>/g, '').trim();

  appendLabMessage('assistant', displayContent);

  if (actionMatch) {
    try {
      const action = JSON.parse(actionMatch[1]);
      await executeLabAction(action);
    } catch(e) {
      // Not valid JSON in action tag — ignore
    }
  }
}

async function executeLabAction(action) {
  const type = action.action;

  if (type === 'backtest') {
    appendLabMessage('assistant', 'Running backtest...', false, true);
    try {
      const r = await fetch('/api/lab/backtest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ proposed_changes: action.changes, description: action.description }),
      });
      const result = await r.json();
      // Feed result back to Claude
      const summary = `Backtest complete: ${result.slates_tested} slates tested. Current MAE: ${result.current_config_mae}, Proposed MAE: ${result.proposed_config_mae}, Improvement: ${result.improvement_pct}%. ${result.recommendation}`;
      appendLabMessage('user', `Backtest result: ${JSON.stringify(result)}`, true);
      await labCallClaude();
    } catch(e) {
      appendLabMessage('assistant', 'Backtest failed. Try again.');
    }

  } else if (type === 'show_config') {
    try {
      const r = await fetch('/api/lab/config-history');
      const data = await r.json();
      appendLabMessage('user', `Config data: ${JSON.stringify(data)}`, true);
      await labCallClaude();
    } catch(e) {}

  } else if (type === 'show_history') {
    try {
      const r = await fetch('/api/lab/config-history');
      const data = await r.json();
      const changelogStr = (data.changelog || []).map(c => `v${c.version} (${c.date}): ${c.change}`).join('\n');
      appendLabMessage('assistant', `**Config History:**\n${changelogStr}`);
    } catch(e) {}

  } else if (type === 'update_config') {
    // Don't auto-apply — show confirm button
    const msgEl = document.createElement('div');
    msgEl.className = 'lab-msg assistant';
    const descText = action.description || JSON.stringify(action.changes);
    msgEl.innerHTML = `
      <div class="lab-msg-label">Ben</div>
      <div>Ready to apply: <b></b></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="lab-apply-btn"
          style="background:var(--lab);border:none;border-radius:8px;color:#fff;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:0.8rem;text-transform:uppercase;cursor:pointer">
          Apply
        </button>
        <button class="lab-decline-btn"
          style="background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.8rem;text-transform:uppercase;cursor:pointer">
          Decline
        </button>
      </div>`;
    msgEl.querySelector('div b').textContent = descText;
    msgEl.querySelector('.lab-apply-btn').addEventListener('click', () => applyLabConfig(action.changes, action.description || '', msgEl));
    msgEl.querySelector('.lab-decline-btn').addEventListener('click', () => {
      msgEl.querySelector('div').textContent = 'Change declined.';
      msgEl.querySelector('div + div').remove();
    });
    document.getElementById('labMessages').appendChild(msgEl);
    msgEl.scrollIntoView({behavior:'smooth'});
  }
}

async function applyLabConfig(changes, description, msgEl) {
  const statusDiv = msgEl.querySelectorAll('div')[1]; // second div = "Ready to apply"
  const btnDiv    = msgEl.querySelector('.lab-apply-btn')?.parentElement;
  try {
    const r = await fetch('/api/lab/update-config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ changes, change_description: description }),
    });
    const result = await r.json();
    if (result.error) {
      if (statusDiv) statusDiv.textContent = `Error: ${result.error}`;
      return;
    }
    if (statusDiv) statusDiv.textContent = `Applied — now config v${result.version}.`;
    if (btnDiv) btnDiv.remove();
    appendLabMessage('user', `Config updated to v${result.version}: ${description}`, true);
    await labCallClaude();
  } catch(e) {
    if (statusDiv) statusDiv.textContent = 'Failed to apply config change.';
  }
}

function appendLabMessage(role, content, hidden = false, isStatus = false) {
  LAB.messages.push({ role, content, hidden });
  if (hidden) return;

  const el = document.createElement('div');
  el.className = `lab-msg ${role}`;

  if (role === 'assistant') {
    // Convert basic markdown: code blocks, bold, italic, newlines
    const formatted = content
      .replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) =>
        `<pre style="background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:0.74rem;overflow-x:auto;white-space:pre-wrap;margin:6px 0">${c.trim()}</pre>`)
      .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.3);border-radius:3px;padding:1px 4px;font-size:0.8em">$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.*?)\*/g, '<i>$1</i>')
      .replace(/\n/g, '<br>');
    el.innerHTML = `<div class="lab-msg-label">Ben</div><div>${formatted}</div>`;
  } else {
    el.textContent = content;
  }

  const msgs = document.getElementById('labMessages');
  msgs.appendChild(el);
  // Scroll to bottom of the messages container (not the page)
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Ben keyboard / nav management ──
// On mobile: when the virtual keyboard opens, the fixed bottom nav floats between
// the input and the keyboard — hide it while Ben's input is focused, restore on blur.
// On desktop: skip entirely (no virtual keyboard, no nav hiding needed).
(function setupBenKeyboard() {
  const isMobile = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  const input  = document.getElementById('labInput');
  const nav    = document.getElementById('bottomNav');
  const tabLab = document.getElementById('tab-lab');
  input.addEventListener('focus', () => {
    if (!isMobile()) return;
    tabLab.classList.add('lab-kb-open');
    nav.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
    nav.style.opacity = '0';
    nav.style.transform = 'translateX(-50%) translateY(16px)';
    nav.style.pointerEvents = 'none';
    // After height expands, scroll messages to bottom so latest is visible
    requestAnimationFrame(() => {
      const msgs = document.getElementById('labMessages');
      msgs.scrollTop = msgs.scrollHeight;
    });
  });
  input.addEventListener('blur', () => {
    if (!isMobile()) return;
    tabLab.classList.remove('lab-kb-open');
    nav.style.opacity = '';
    nav.style.transform = '';
    nav.style.pointerEvents = '';
    // Reset any viewport offset iOS leaves behind after keyboard dismissal
    setTimeout(() => window.scrollTo(0, 0), 50);
  });
})();

async function labSend() {
  const input = document.getElementById('labInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  appendLabMessage('user', text);
  await labCallClaude();
}

function labSendQuick(text) {
  document.getElementById('labInput').value = text;
  labSend();
}

async function labViewConfig() {
  try {
    const r = await fetch('/api/lab/config-history');
    const data = await r.json();
    const formatted = `Current config (v${data.version}):\n${JSON.stringify(data.config, null, 2)}`;
    appendLabMessage('user', 'Show me the current config', false);
    appendLabMessage('assistant', '```\n' + formatted + '\n```');
  } catch(e) {}
}

async function labRefreshBriefing() {
  try {
    const r = await fetch('/api/lab/briefing');
    LAB.briefing = await r.json();
    LAB.system = buildLabSystemPrompt();
    appendLabMessage('user', 'I refreshed the briefing. What does the latest analysis show?', false);
    await labCallClaude();
  } catch(e) {}
}
