<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Real Sports Picks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 460px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1;
      padding: 0.6rem 0;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      color: #888;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tab:hover { background: #222240; border-color: #444; }
    .tab.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }
    .tab:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .spinner {
      display: none;
      margin: 1.5rem auto 0;
      width: 32px;
      height: 32px;
      border: 3px solid #333;
      border-top-color: #1d4ed8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .picks-list {
      list-style: none;
      margin-top: 1.5rem;
      text-align: left;
    }
    .picks-list li {
      background: #141428;
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: 10px;
      border-left: 3px solid #1d4ed8;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .slot-badge {
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      min-width: 3rem;
      text-align: center;
      flex-shrink: 0;
    }
    .player-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .player-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      color: #888;
      font-size: 0.78rem;
      margin-top: 0.15rem;
    }
    .player-meta .team-tag {
      color: #a5b4fc;
      font-weight: 600;
    }
    .error {
      margin-top: 1.5rem;
      color: #f87171;
      font-size: 0.95rem;
    }
    .mode-desc {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 1rem;
      min-height: 1.1rem;
    }
    .btn {
      width: 100%;
      padding: 0.85rem;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NBA Real Sports Picks</h1>
    <p class="subtitle">Top 5 player picks for today</p>

    <div class="tabs">
      <button class="tab active" data-mode="chalk" onclick="switchMode('chalk')">Chalk</button>
      <button class="tab" data-mode="diff" onclick="switchMode('diff')">Differentiated</button>
      <button class="tab" data-mode="contrarian" onclick="switchMode('contrarian')">Contrarian</button>
    </div>
    <p class="mode-desc" id="modeDesc">Highest-floor picks — proven producers with strong matchups.</p>

    <button class="btn" id="getPicksBtn" onclick="getPicks()">Get Picks</button>

    <div class="spinner" id="spinner"></div>
    <ul class="picks-list" id="picks"></ul>
    <p class="error" id="error"></p>
  </div>

  <script>
    const MODE_DESCRIPTIONS = {
      chalk: 'Highest-floor picks \u2014 proven producers with strong matchups.',
      diff: 'Balanced value \u2014 projection weighted by outperformance potential.',
      contrarian: 'Hidden gems \u2014 trending players set to exceed expectations.',
    };

    let currentMode = 'chalk';
    let loading = false;

    function switchMode(mode) {
      if (loading) return;
      currentMode = mode;

      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === mode);
      });
      document.getElementById('modeDesc').textContent = MODE_DESCRIPTIONS[mode];
    }

    async function getPicks(mode) {
      if (!mode) mode = currentMode;
      const spinner = document.getElementById('spinner');
      const picksList = document.getElementById('picks');
      const errorEl = document.getElementById('error');

      const btn = document.getElementById('getPicksBtn');
      loading = true;
      btn.disabled = true;
      document.querySelectorAll('.tab').forEach(t => t.disabled = true);
      spinner.style.display = 'block';
      picksList.innerHTML = '';
      errorEl.textContent = '';

      try {
        const res = await fetch('/api/picks?mode=' + encodeURIComponent(mode));
        const data = await res.json();

        if (data.error) {
          errorEl.textContent = data.error;
        } else if (Array.isArray(data)) {
          data.forEach(player => {
            const li = document.createElement('li');
            li.innerHTML =
              '<span class="slot-badge">' + player.slot + '</span>' +
              '<div class="player-info">' +
                '<span class="player-name">' + player.name + '</span>' +
                '<span class="player-meta">' +
                  '<span class="team-tag">' + player.team + '</span>' +
                  ' \u2014 ' + player.game +
                '</span>' +
              '</div>';
            picksList.appendChild(li);
          });
        }
      } catch (err) {
        errorEl.textContent = 'Failed to fetch picks. Please try again.';
      } finally {
        loading = false;
        btn.disabled = false;
        document.querySelectorAll('.tab').forEach(t => t.disabled = false);
        spinner.style.display = 'none';
      }
    }

  </script>
</body>
</html>
