<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oracle — NBA Draft Optimizer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Oracle">
  <meta name="application-name" content="The Oracle">
  <meta name="theme-color" content="#060a0f">
  <meta property="og:title" content="The Oracle — NBA Draft Optimizer">
  <meta property="og:description" content="AI-powered NBA draft optimizer for the Real Sports App with game script analysis and calibration feedback.">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: rgba(12, 18, 28, 0.85);
      --surface2: rgba(20, 30, 48, 0.6);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --chalk: #4f8ef7;
      --chalk-glow: rgba(79,142,247,0.25);
      --upside: #f97316;
      --upside-glow: rgba(249,115,22,0.25);
      --muted: #64748b;
      --text: #e8edf5;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --r: 14px;
      /* Log page palette — desaturated/cooler, WCAG AA on dark bg */
      --log-chalk: #7ba4c8;
      --log-chalk-glow: rgba(123,164,200,0.2);
      --log-upside: #b89878;
      --log-upside-glow: rgba(184,152,120,0.2);
      --log-win: #d4a640;
      --log-win-glow: rgba(212,166,64,0.2);
      --log-opt: #9b80c8;
      --log-opt-glow: rgba(155,128,200,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Court texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -20%;  left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--chalk);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 16px var(--chalk-glow);
    }
    .logo-sub {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.15em; display: block; margin-top: 1px;
    }

    /* ── TOP TAB NAVIGATION ── */
    .tab-nav {
      display: flex; gap: 2px;
      padding: 10px 0 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px 10px;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      border-radius: 4px 4px 0 0;
    }
    .tab-btn:hover { color: var(--text-dim); }
    .tab-btn.active { color: var(--chalk); border-bottom-color: var(--chalk); }
    .tab-btn .tab-dot {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--green); margin-left: 5px; vertical-align: middle;
      opacity: 0; transition: opacity 0.3s;
    }
    .tab-btn .tab-dot.visible { opacity: 1; }

    /* ── TAB PAGES ── */
    .tab-page { display: none; }
    .tab-page.active { display: block; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── CHALK/UPSIDE TABS ── */
    .mode-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
    .mode-tab {
      flex: 1; padding: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      cursor: pointer; transition: all 0.25s;
    }
    .mode-tab.active[data-t="chalk"] { background: rgba(79,142,247,0.12); border-color: var(--chalk); color: var(--chalk); }
    .mode-tab.active[data-t="upside"] { background: rgba(249,115,22,0.12); border-color: var(--upside); color: var(--upside); }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 16px 16px 20px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .player-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Left colored accent bar */
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--tcolor, var(--chalk));
      border-radius: 0 3px 3px 0;
      box-shadow: 2px 0 12px var(--tcolor, var(--chalk));
    }

    /* Subtle team color bg wash */
    .player-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 50%, var(--tcolor-alpha, rgba(79,142,247,0.04)) 0%, transparent 60%);
      pointer-events: none;
    }

    .rank-badge {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      color: var(--tcolor, var(--chalk));
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .player-info { position: relative; z-index: 1; min-width: 0; }
    .player-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 3px; display: flex; align-items: center; gap: 6px;
    }
    .pos-pill {
      background: var(--border-bright); border-radius: 3px;
      padding: 1px 5px; font-size: 0.6rem;
    }
    .injury-badge {
      background: rgba(244,63,94,0.15); color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.3); border-radius: 3px;
      padding: 1px 5px; font-size: 0.55rem; font-weight: 800;
      letter-spacing: 0.08em;
    }
    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 800; line-height: 1;
      color: #fff; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
      display: flex; align-items: center; gap: 3px;
    }
    .stat-pill b { color: var(--text); font-weight: 700; }
    .stat-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--tcolor, var(--chalk)); opacity: 0.5;
    }

    .score-col {
      text-align: right; position: relative; z-index: 1;
      border-left: 1px solid var(--border);
      padding-left: 14px; min-width: 72px;
    }
    .score-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 900; line-height: 1;
      color: var(--score-color, var(--chalk));
    }
    .score-label {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 3px;
    }
    .slot-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      color: var(--score-color, var(--chalk));
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px; padding: 2px 6px;
      display: inline-block; margin-top: 4px;
    }

    .mult-badge {
      background: rgba(79,142,247,0.1); color: var(--chalk);
      border: 1px solid rgba(79,142,247,0.2);
      font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
    }

    /* ── SKELETON LOADING ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .skel-block {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-circle { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; }
    .skel-line { height: 10px; margin-bottom: 8px; }
    .skel-line.wide { width: 70%; }
    .skel-line.narrow { width: 40%; }
    .skel-score { width: 48px; height: 44px; }

    /* ── GAME SELECTOR ── */
    .game-select-wrap { position: relative; margin-bottom: 12px; }
    .game-select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.9rem;
    }
    select {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 14px 40px 14px 16px;
      border-radius: 12px;
      appearance: none;
      outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--chalk); }

    /* ── BUTTONS ── */
    .analyze-btn {
      width: 100%;
      background: var(--chalk);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 15px;
      border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--chalk-glow);
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 24px var(--chalk-glow); }
    .analyze-btn:disabled { opacity: 0.35; filter: grayscale(0.5); transform: none; box-shadow: none; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-btn {
      background: none; border: none; color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; cursor: pointer; padding: 4px 0 16px;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    /* ── GAME INFO CHIPS ── */
    .game-chips { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; color: var(--text-dim);
    }
    .chip b { color: var(--text); }

    .lock-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      padding: 5px 10px; border-radius: 6px;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin: 28px 0;
    }

    /* ── EMPTY/PLACEHOLDER STATE ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    .placeholder-page {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 40vh; text-align: center; padding: 48px 24px;
    }
    .placeholder-page .pl-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .placeholder-page h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }
    .placeholder-page p { font-size: 0.8rem; color: var(--muted); }

    /* ── ERROR BANNER ── */
    .error-banner {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem; color: #fda4af;
      margin-bottom: 16px;
      display: none;
    }

    .hidden { display: none !important; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--bg); border: 1px solid var(--border-bright); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: 16px; color: var(--text);
    }
    .score-row {
      display: grid; grid-template-columns: 1fr 50px 70px; gap: 8px; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .score-row-name { font-size: 0.82rem; font-weight: 600; }
    .score-row-pred { font-size: 0.75rem; color: var(--muted); text-align: center; }
    .score-row input {
      background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 8px;
      padding: 8px; color: var(--text); font-size: 0.85rem; font-weight: 600; text-align: center;
      outline: none; width: 100%;
    }
    .score-row input:focus { border-color: var(--chalk); }
    .score-row input[type="text"] { text-align: left; font-weight: 400; }
    .modal-cancel {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--border-bright); color: var(--text-dim); }
    .modal-submit {
      flex: 2; padding: 10px; border-radius: 10px; border: none;
      background: var(--chalk); color: #fff; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── LOG PAGE SPECIFIC ── */

    /* Date strip */
    .date-strip {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-chip {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      min-width: 52px;
    }
    .date-chip:hover { border-color: var(--border-bright); }
    .date-chip.active {
      background: rgba(79,142,247,0.12);
      border-color: var(--chalk);
    }
    .date-chip-day {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .date-chip.active .date-chip-day { color: var(--chalk); }
    .date-chip-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900; color: var(--text-dim); line-height: 1;
    }
    .date-chip.active .date-chip-num { color: var(--chalk); }
    .date-chip-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--log-win); opacity: 0.8;
    }
    .date-chip-dot.hidden-dot { opacity: 0; }

    /* Log game grid */
    .log-game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .log-slate-card {
      grid-column: 1 / -1;
      background: rgba(79,142,247,0.06);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: var(--r); padding: 16px 20px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-slate-card:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.1); }
    .log-slate-card-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--chalk);
    }
    .log-slate-card-sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 3px; }

    .log-game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .log-game-card:hover { border-color: var(--border-bright); }
    .log-game-matchup {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      color: var(--text); margin-bottom: 4px;
    }
    .log-game-meta { font-size: 0.68rem; color: var(--muted); }
    .log-has-data { color: var(--log-win); font-size: 0.65rem; font-weight: 700; margin-top: 4px; }

    /* Log drill-down */
    .log-drill-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .log-drill-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text);
    }
    .log-date-label {
      font-size: 0.7rem; color: var(--muted); margin-top: 2px;
    }

    /* Log prediction cards — shifted palette */
    .player-card.log-card::before { background: var(--tcolor, var(--log-chalk)); box-shadow: 2px 0 12px var(--tcolor, var(--log-chalk)); }
    .player-card.log-card .rank-badge { color: var(--tcolor, var(--log-chalk)); }
    .player-card.log-card .score-num { color: var(--log-score-color, var(--log-chalk)); }
    .player-card.log-card .slot-badge {
      color: var(--log-score-color, var(--log-chalk));
      background: rgba(123,164,200,0.08);
      border-color: rgba(123,164,200,0.2);
    }
    .player-card.log-card .mult-badge {
      background: rgba(123,164,200,0.08); color: var(--log-chalk);
      border-color: rgba(123,164,200,0.2);
    }

    /* Actual RS overlay on log cards */
    .actual-rs-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px;
    }
    .actual-rs-pill.hit { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .actual-rs-pill.miss { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }

    /* Upload section in log drill-down */
    .log-upload-section {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px; margin-bottom: 16px;
    }
    .log-upload-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;
    }
    .log-upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .log-upload-btn {
      padding: 12px 10px;
      background: var(--surface); border: 1px solid var(--border-bright);
      border-radius: 10px; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .log-upload-btn:hover { border-color: var(--log-chalk); }
    .log-upload-btn.done { border-color: var(--green); background: rgba(34,197,94,0.06); }
    .log-upload-btn-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 2px;
    }
    .log-upload-btn.done .log-upload-btn-label { color: var(--green); }
    .log-upload-btn-sub { font-size: 0.62rem; color: var(--muted); }
    .log-upload-solo {
      width: 100%;
      padding: 12px;
      background: var(--surface); border: 1px solid var(--border-bright);
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-dim);
    }
    .log-upload-solo:hover { border-color: var(--log-chalk); }
    .log-upload-solo.done { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.06); }
    input[type="file"].hidden-file { display: none; }

    /* Result cards */
    .result-section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px; margin: 20px 0 12px;
    }
    .result-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
    }
    .result-badge.win { background: rgba(212,166,64,0.15); color: var(--log-win); border: 1px solid rgba(212,166,64,0.3); }
    .result-badge.opt { background: rgba(155,128,200,0.15); color: var(--log-opt); border: 1px solid rgba(155,128,200,0.3); }

    .winning-draft-card {
      background: var(--surface);
      border: 1px solid rgba(212,166,64,0.25);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .winning-draft-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--log-win); margin-bottom: 8px;
    }
    .winning-draft-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 900; color: var(--log-win); float: right;
    }
    .winning-draft-player {
      font-size: 0.78rem; color: var(--text-dim); padding: 3px 0;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }
    .winning-draft-player:last-child { border-bottom: none; }
    .winning-draft-player b { color: var(--text); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🏀</div>
      <div>
        THE ORACLE
        <span class="logo-sub">NBA Draft Optimizer</span>
      </div>
    </div>
    <div id="predSavedChip" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);padding:4px 10px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:6px"></div>
  </header>

  <!-- ══ TOP TAB NAVIGATION ══ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="predictions" onclick="switchTab('predictions')">Predictions</button>
    <button class="tab-btn" data-tab="log" onclick="switchTab('log')">Log<span class="tab-dot" id="logTabDot"></span></button>
    <button class="tab-btn" data-tab="line" onclick="switchTab('line')">Line</button>
    <button class="tab-btn" data-tab="lab" onclick="switchTab('lab')">Lab</button>
  </nav>

  <!-- ══ TAB: PREDICTIONS ══ -->
  <div id="tab-predictions" class="tab-page active">

    <!-- Today's Top 5 (slate) -->
    <div class="section-label">Today's Top 5</div>
    <div id="slateChips" class="game-chips"></div>

    <div class="mode-tabs" id="slateTabs" style="display:none">
      <button class="mode-tab active" data-t="chalk" onclick="switchSlate('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchSlate('upside')">🚀 Moonshot</button>
    </div>

    <div id="slateList"></div>

    <div class="divider"></div>

    <!-- Game Picker -->
    <div class="section-label">Game Analysis</div>
    <div id="errorBanner" class="error-banner"></div>
    <div class="game-select-wrap">
      <select id="gameSel"><option value="">Loading games...</option></select>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled onclick="runAnalysis()">
      Analyze Draft
    </button>

    <div class="mode-tabs" id="picksTabsWrap" style="display:none;">
      <button class="mode-tab active" data-t="chalk" onclick="switchPicksTab('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchPicksTab('upside')">🚀 Moonshot</button>
    </div>
    <div id="gameScriptBadge" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;text-align:center;padding:8px 14px;margin:8px 0 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px"></div>
    <div id="gameLockBadge" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;text-align:center;padding:6px 12px;margin-bottom:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px"></div>
    <div id="gameInjuryBadge" style="display:none;font-size:0.68rem;color:#fbbf24;padding:6px 12px;text-align:center;letter-spacing:0.3px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15);border-radius:8px;margin-bottom:14px"></div>
    <div id="picksList"></div>

  </div>

  <!-- ══ TAB: LOG ══ -->
  <div id="tab-log" class="tab-page">

    <!-- Date strip -->
    <div class="date-strip" id="logDateStrip"></div>

    <!-- Grid view -->
    <div id="logGridView">
      <div class="section-label" id="logGridLabel">Games</div>
      <div class="log-game-grid" id="logGameGrid">
        <div class="empty-state" style="grid-column:1/-1">
          <span class="icon">📅</span>
          <p>Select a date to view game log.</p>
        </div>
      </div>
    </div>

    <!-- Drill-down view -->
    <div id="logDrillView" style="display:none">
      <button class="back-btn" onclick="closeLogDrilldown()">← Back</button>
      <div class="log-drill-header">
        <div>
          <div class="log-drill-title" id="logDrillTitle">Full Slate</div>
          <div class="log-date-label" id="logDrillDate"></div>
        </div>
      </div>

      <!-- Prediction cards (log palette) -->
      <div class="mode-tabs" id="logDrillTabs">
        <button class="mode-tab active" data-t="chalk" onclick="switchLogTab('chalk')">⚡ Starting 5</button>
        <button class="mode-tab" data-t="upside" onclick="switchLogTab('upside')">🚀 Moonshot</button>
      </div>
      <div id="logPredCards"></div>

      <!-- Upload section -->
      <div class="log-upload-section" id="logUploadSection">
        <div class="log-upload-title">Upload Results</div>
        <div id="logUploadSlate" style="display:none">
          <div class="log-upload-grid">
            <div class="log-upload-btn" id="logUploadRSBtn" onclick="triggerLogUpload('real_scores')">
              <span class="log-upload-btn-label">Real Scores</span>
              <span class="log-upload-btn-sub">Daily draft stats screenshot</span>
            </div>
            <div class="log-upload-btn" id="logUploadWinBtn" onclick="triggerLogUpload('winning_drafts')">
              <span class="log-upload-btn-label">Top Drafts</span>
              <span class="log-upload-btn-sub">Leaderboard screenshot</span>
            </div>
          </div>
        </div>
        <div id="logUploadGame" style="display:none">
          <button class="log-upload-solo" id="logUploadGameBtn" onclick="triggerLogUpload('winning_drafts')">
            Upload Winning Drafts
          </button>
        </div>
        <div id="logUploadStatus" style="display:none;font-size:0.72rem;color:var(--text-dim);margin-top:10px;text-align:center"></div>
      </div>

      <!-- Hidden file inputs -->
      <input type="file" accept="image/*" id="logFileInputRS" class="hidden-file" onchange="handleLogFile(this,'real_scores')">
      <input type="file" accept="image/*" id="logFileInputWin" class="hidden-file" onchange="handleLogFile(this,'winning_drafts')">

      <!-- Results section -->
      <div id="logResultSection"></div>
    </div>

  </div>

  <!-- ══ TAB: LINE ══ -->
  <div id="tab-line" class="tab-page">
    <div class="placeholder-page">
      <div class="pl-icon">📈</div>
      <h2>Line of the Day</h2>
      <p>Coming soon</p>
    </div>
  </div>

  <!-- ══ TAB: LAB ══ -->
  <div id="tab-lab" class="tab-page">
    <div class="placeholder-page">
      <div class="pl-icon">🔬</div>
      <h2>Lab</h2>
      <p>Coming soon</p>
    </div>
  </div>

</div>

<script>
const TEAM_COLORS = {
  ATL:"#e03a3e",BOS:"#007A33",BKN:"#aaaaaa",CHA:"#00788c",CHI:"#ce1141",
  CLE:"#860038",DAL:"#00538c",DEN:"#fdb927",DET:"#c8102E",GSW:"#1d428a",
  HOU:"#ce1141",IND:"#fdbb30",LAC:"#c8102E",LAL:"#fdb927",MEM:"#5d76a9",
  MIA:"#98002E",MIL:"#00471B",MIN:"#0c2340",NOP:"#85714d",NYK:"#f58426",
  OKC:"#007ac1",ORL:"#0077c0",PHI:"#006bb6",PHX:"#e56020",POR:"#E03A3E",
  SAC:"#5a2d81",SAS:"#c4ced4",TOR:"#ce1141",UTA:"#f9a01b",WAS:"#002B5C"
};

// ── Global state ──
let SLATE = null;
let PICKS_DATA = null;

// Log state
const LOG = {
  selectedDate: null,
  view: 'grid',          // 'grid' | 'drill'
  scope: null,           // 'slate' | 'game_XXXX'
  gameLabel: null,
  datesWithData: new Set(),
  data: null,            // {date, scopes, actuals}
  currentTab: 'chalk',
  uploadType: null,      // 'real_scores' | 'winning_drafts'
  parsedRS: null,        // parsed real scores array
  parsedWin: null,       // parsed winning drafts array
  hindsightLineup: null,
};

// ── TAB SWITCHING ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-page').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if (tab === 'log' && !LOG.selectedDate) {
    initLogPage();
  }
}

// ── INIT ──
(async function init() {
  loadSlate();
  initGameSelector();
})();

// ── GAME SELECTOR ──
async function initGameSelector() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  try {
    const r = await fetch('/api/games');
    const games = await r.json();
    if (!games.length) {
      sel.innerHTML = '<option value="">No games today</option>';
      return;
    }
    sel.innerHTML = '<option value="">Select a game...</option>';
    games.forEach(g => {
      const o = document.createElement('option');
      o.value = g.gameId;
      let label = g.label + (g.total ? ` \u00B7 O/U ${g.total}` : '');
      if (g.startTime) {
        const start = new Date(g.startTime);
        label += ` \u00B7 ${start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
      }
      if (g.locked) label += ' \uD83D\uDD12';
      o.textContent = label;
      sel.appendChild(o);
    });
    sel.onchange = () => { btn.disabled = !sel.value; };
  } catch(e) {
    sel.innerHTML = '<option value="">Offline — check backend</option>';
  }
}

// ── SLATE ──
async function loadSlate() {
  renderSkeletons('slateList', 5);
  try {
    const r = await fetch('/api/slate');
    if (!r.ok) throw new Error('Slate fetch failed');
    const slateData = await r.json();
    if (slateData.locked && !slateData.lineups.chalk.length && SLATE) {
      SLATE.locked = true;
    } else {
      SLATE = slateData;
    }
    document.getElementById('slateTabs').style.display = 'flex';

    const chips = document.getElementById('slateChips');
    const slateDate = SLATE.date ? new Date(SLATE.date + 'T12:00:00') : new Date();
    const dateStr = slateDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    let lockChip = '';
    if (SLATE.locked) {
      lockChip = '<div class="lock-chip">Picks Locked</div>';
    }
    const gameCount = SLATE.draftable_count ?? SLATE.games.length;
    chips.innerHTML = `
      <div class="chip"><b>${gameCount}</b> Games</div>
      <div class="chip">${dateStr}</div>
      ${lockChip}
    `;
    switchSlate('chalk');
    savePredictions();
  } catch(e) {
    document.getElementById('slateList').innerHTML = `
      <div class="empty-state">
        <span class="icon">📡</span>
        <p>Couldn't load today's slate.<br>Make sure the API server is running.</p>
      </div>`;
  }
}

function switchPicksTab(tab) {
  document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (PICKS_DATA) renderCards(PICKS_DATA.lineups[tab] || [], 'picksList', tab);
}

function switchSlate(tab) {
  document.querySelectorAll('#slateTabs .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (SLATE) renderCards(SLATE.lineups[tab] || [], 'slateList', tab);
}

// ── ANALYSIS ──
async function runAnalysis() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  const banner = document.getElementById('errorBanner');
  const gameId = sel.value;
  if (!gameId) return;

  banner.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  renderSkeletons('picksList', 5);

  try {
    const r = await fetch(`/api/picks?gameId=${gameId}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Server error' }));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const picksData = await r.json();
    if (picksData.locked && !picksData.lineups.chalk.length && PICKS_DATA) {
      PICKS_DATA.locked = true;
    } else {
      PICKS_DATA = picksData;
    }
    document.getElementById('picksTabsWrap').style.display = 'flex';
    document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.t === 'chalk'));

    const badge = document.getElementById('gameScriptBadge');
    if (PICKS_DATA.gameScript) {
      const total = PICKS_DATA.game?.total;
      badge.innerHTML = `Game Script: <b>${PICKS_DATA.gameScript}</b>${total ? ` (O/U ${total})` : ''}`;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }

    const lockBadge = document.getElementById('gameLockBadge');
    if (PICKS_DATA.locked) {
      lockBadge.innerHTML = 'Picks locked — showing final predictions';
      lockBadge.style.display = 'block';
      lockBadge.style.color = '#22c55e';
    } else {
      lockBadge.style.display = 'none';
    }

    const injBadge = document.getElementById('gameInjuryBadge');
    const injuries = PICKS_DATA.injuries || [];
    if (injuries.length > 0) {
      const names = injuries.map(inj => `${inj.name} (${inj.team})`).join(', ');
      injBadge.innerHTML = `<b>${injuries.length} OUT</b>: ${names}`;
      injBadge.style.display = 'block';
    } else {
      injBadge.style.display = 'none';
    }

    renderCards(PICKS_DATA.lineups.chalk, 'picksList', 'chalk');
    savePredictions();
  } catch(e) {
    document.getElementById('picksList').innerHTML = '';
    banner.textContent = `⚠ ${e.message}`;
    banner.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Draft';
  }
}

// ── RENDER CARDS ──
function renderCards(picks, containerId, mode, opts = {}) {
  const el = document.getElementById(containerId);
  if (!picks || !picks.length) {
    const msg = SLATE?.no_games_yet
      ? `Today's slate will be available around <b>${SLATE.available_after}</b>.`
      : 'No players to display yet.';
    el.innerHTML = `<div class="empty-state"><span class="icon">🏀</span><p>${msg}</p></div>`;
    return;
  }

  const isUpside = mode === 'upside';
  const isLog = opts.log || false;
  const scoreColor = isLog
    ? (isUpside ? 'var(--log-upside)' : 'var(--log-chalk)')
    : (isUpside ? 'var(--upside)' : 'var(--chalk)');
  const actualsMap = opts.actualsMap || {};

  el.innerHTML = picks.map((p, i) => {
    const tc = TEAM_COLORS[p.team] || (isLog ? '#7ba4c8' : '#4f8ef7');
    const tcAlpha = (() => {
      const hex = tc.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      return `rgba(${r},${g},${b},0.06)`;
    })();

    const multBadge = p.est_mult ? `<span class="mult-badge">+${p.est_mult}x card</span>` : '';

    // Actual RS pill for log cards
    let actualPill = '';
    if (isLog) {
      const act = actualsMap[p.name];
      if (act !== undefined) {
        const pred = parseFloat(p.rating) || 0;
        const cls = act >= pred * 0.85 ? 'hit' : 'miss';
        actualPill = `<span class="actual-rs-pill ${cls}">RS ${act}</span>`;
      }
    }

    const statsHtml = [
      multBadge,
      actualPill,
      p.predMin && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.predMin}</b> min</div>`,
      p.pts      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.pts}</b> pts</div>`,
      p.reb      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.reb}</b> reb</div>`,
      p.ast      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.ast}</b> ast</div>`,
      p.stl      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.stl}</b> stl</div>`,
      p.blk      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.blk}</b> blk</div>`,
      (p._decline && p._decline < 0.85) && `<div class="stat-pill" style="color:#f43f5e"><b>↓${Math.round((1-p._decline)*100)}%</b> usage</div>`,
    ].filter(Boolean).join('');

    const logCardClass = isLog ? ' log-card' : '';
    const logScoreColorVar = isLog ? `--log-score-color:${scoreColor};` : '';

    return `
      <div class="player-card${logCardClass}" style="--tcolor:${tc};--tcolor-alpha:${tcAlpha};${logScoreColorVar}${!isLog ? `--score-color:${scoreColor};` : ''}animation-delay:${i*0.06}s">
        <div class="rank-badge">${p.slot || (i+1)}</div>
        <div class="player-info">
          <div class="player-meta">
            ${p.team || '—'} <span class="pos-pill">${p.pos || '—'}</span>${p.injury_status ? ` <span class="injury-badge">${p.injury_status}</span>` : ''}
          </div>
          <div class="player-name">${p.name}</div>
          <div class="stat-pills">${statsHtml}</div>
        </div>
        <div class="score-col" style="--score-color:${scoreColor};">
          <div class="score-num">${p.rating}</div>
          <span class="score-label">RS</span>
          ${p.chalk_ev ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:700;color:var(--muted);margin-top:2px">${p.chalk_ev} EV</div>` : ''}
          <div class="slot-badge" style="background:${isUpside?(isLog?'rgba(184,152,120,0.08)':'rgba(249,115,22,0.1)'):(isLog?'rgba(123,164,200,0.08)':'rgba(79,142,247,0.1)')};border-color:${isUpside?(isLog?'rgba(184,152,120,0.2)':'rgba(249,115,22,0.25)'):(isLog?'rgba(123,164,200,0.2)':'rgba(79,142,247,0.25)')}">
            ${p.slot || '—'}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── SKELETON ──
function renderSkeletons(containerId, count) {
  document.getElementById(containerId).innerHTML = Array.from({length: count}, (_, i) => `
    <div class="skeleton" style="animation-delay:${i*0.07}s">
      <div class="skel-block skel-circle"></div>
      <div class="skel-lines">
        <div class="skel-block skel-line wide"></div>
        <div class="skel-block skel-line narrow"></div>
      </div>
      <div class="skel-block skel-score"></div>
    </div>`).join('');
}

// ── SAVE PREDICTIONS TO GIT ──
async function savePredictions() {
  try {
    const r = await fetch('/api/save-predictions', { method: 'POST' });
    if (r.ok) {
      const result = await r.json();
      const chip = document.getElementById('predSavedChip');
      chip.textContent = `Saved ${result.rows} predictions`;
      chip.style.display = 'inline-block';
      setTimeout(() => { chip.style.display = 'none'; }, 4000);
    }
  } catch(e) {
    console.warn('Prediction save failed:', e);
  }
}

// ════════════════════════════════════════════════════════
// ── LOG PAGE ──
// ════════════════════════════════════════════════════════

async function initLogPage() {
  // Build date strip for last 30 days
  const today = new Date();
  const strip = document.getElementById('logDateStrip');
  strip.innerHTML = '';

  // Load dates with data
  try {
    const r = await fetch('/api/log/dates');
    if (r.ok) {
      const dates = await r.json();
      dates.forEach(d => LOG.datesWithData.add(d));
      // Light the dot on the Log tab if there's historical data
      if (dates.length) {
        document.getElementById('logTabDot')?.classList.add('visible');
      }
    }
  } catch(e) { /* non-fatal */ }

  // Build chips: today + 29 prior days
  const chips = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase().slice(0, 3);
    const numLabel = d.getDate();
    const hasData = LOG.datesWithData.has(iso);
    chips.push({ iso, dayLabel, numLabel, hasData, isToday: i === 0 });
  }

  strip.innerHTML = chips.map(c => `
    <button class="date-chip${c.isToday ? ' active' : ''}" data-date="${c.iso}" onclick="selectLogDate('${c.iso}')">
      <span class="date-chip-day">${c.dayLabel}</span>
      <span class="date-chip-num">${c.numLabel}</span>
      <span class="date-chip-dot${c.hasData ? '' : ' hidden-dot'}"></span>
    </button>`).join('');

  // Auto-select today
  const todayIso = today.toISOString().slice(0, 10);
  selectLogDate(todayIso);
}

async function selectLogDate(dateStr) {
  // Update strip selection
  document.querySelectorAll('.date-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.date === dateStr));

  LOG.selectedDate = dateStr;
  LOG.data = null;
  closeLogDrilldown();

  // Load data
  const grid = document.getElementById('logGameGrid');
  grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">⏳</span><p>Loading...</p></div>`;

  try {
    const r = await fetch(`/api/log/get?date=${dateStr}`);
    if (!r.ok) throw new Error('Failed to load log data');
    LOG.data = await r.json();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📡</span><p>Couldn't load data for this date.</p></div>`;
    return;
  }

  renderLogGrid(dateStr);
}

function renderLogGrid(dateStr) {
  const data = LOG.data;
  const grid = document.getElementById('logGameGrid');
  const label = document.getElementById('logGridLabel');

  const d = new Date(dateStr + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
  label.textContent = dateLabel;

  if (!data || !data.has_predictions) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📭</span><p>No predictions saved for this date.</p></div>`;
    return;
  }

  // Build game list from scopes
  const scopes = data.scopes || {};
  const gameScopes = Object.keys(scopes).filter(s => s !== 'slate');
  const hasSlate = 'slate' in scopes;
  const hasActuals = data.has_actuals;

  let html = '';

  // Full Slate card
  if (hasSlate) {
    const playerCount = (scopes['slate']?.chalk?.length || 0) + (scopes['slate']?.upside?.length || 0);
    html += `
      <div class="log-slate-card" onclick="openLogDrilldown('slate', 'Full Slate')">
        <div>
          <div class="log-slate-card-label">Full Slate</div>
          <div class="log-slate-card-sub">${playerCount} players${hasActuals ? ' · Results available' : ''}</div>
        </div>
        <span style="color:var(--chalk);font-size:1.2rem">›</span>
      </div>`;
  }

  // Per-game cards — scope is now the readable label (e.g. "BOS @ NYK")
  gameScopes.forEach(scope => {
    const chalkCount = scopes[scope]?.chalk?.length || 0;
    const escapedScope = scope.replace(/'/g, "\\'");
    html += `
      <div class="log-game-card" onclick="openLogDrilldown('${escapedScope}', '${escapedScope}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="log-game-matchup">${scope}</div>
          <span style="color:var(--muted);font-size:1rem;margin-left:6px">›</span>
        </div>
        <div class="log-game-meta">${chalkCount} players${hasActuals ? ' · Results' : ''}</div>
      </div>`;
  });

  if (!html) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📭</span><p>No data for this date.</p></div>`;
    return;
  }

  grid.innerHTML = html;
}

function openLogDrilldown(scope, gameLabel) {
  LOG.scope = scope;
  LOG.gameLabel = gameLabel;
  LOG.currentTab = 'chalk';
  LOG.parsedRS = null;
  LOG.parsedWin = null;
  LOG.hindsightLineup = null;

  document.getElementById('logGridView').style.display = 'none';
  document.getElementById('logDrillView').style.display = 'block';

  const d = new Date((LOG.selectedDate || '') + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();

  document.getElementById('logDrillTitle').textContent = gameLabel || scope;
  document.getElementById('logDrillDate').textContent = dateLabel;

  // Configure upload section
  const isSlate = scope === 'slate';
  document.getElementById('logUploadSlate').style.display = isSlate ? 'block' : 'none';
  document.getElementById('logUploadGame').style.display = isSlate ? 'none' : 'block';

  // Reset upload button states
  document.getElementById('logUploadRSBtn')?.classList.remove('done');
  document.getElementById('logUploadWinBtn')?.classList.remove('done');
  document.getElementById('logUploadGameBtn')?.classList.remove('done');
  document.getElementById('logUploadStatus').style.display = 'none';
  document.getElementById('logResultSection').innerHTML = '';

  renderLogDrillCards();
}

function closeLogDrilldown() {
  document.getElementById('logGridView').style.display = 'block';
  document.getElementById('logDrillView').style.display = 'none';
}

function switchLogTab(tab) {
  LOG.currentTab = tab;
  document.querySelectorAll('#logDrillTabs .mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.t === tab));
  renderLogDrillCards();
}

function renderLogDrillCards() {
  const data = LOG.data;
  const scope = LOG.scope;
  const tab = LOG.currentTab;

  if (!data || !data.scopes || !data.scopes[scope]) {
    document.getElementById('logPredCards').innerHTML = `<div class="empty-state"><span class="icon">📭</span><p>No predictions saved for this scope.</p></div>`;
    return;
  }

  const players = data.scopes[scope][tab] || [];

  // Build actuals map: player_name → actual_rs
  const actualsMap = {};
  if (data.actuals) {
    data.actuals.forEach(a => {
      if (a.player_name && a.actual_rs) {
        actualsMap[a.player_name] = parseFloat(a.actual_rs);
      }
    });
  }

  // Normalize player objects from CSV format
  const normalized = players.map((p, i) => ({
    name: p.name || p.player_name || '',
    team: p.team || '',
    pos: p.pos || '',
    rating: parseFloat(p.rating || p.predicted_rs || 0).toFixed(1),
    est_mult: p.est_mult || p.est_card_boost || '',
    predMin: p.predMin || p.pred_min || '',
    slot: p.slot || `${i+1}`,
  }));

  renderCards(normalized, 'logPredCards', tab, { log: true, actualsMap });
}

// ── LOG UPLOAD ──
function triggerLogUpload(type) {
  LOG.uploadType = type;
  if (type === 'real_scores') {
    document.getElementById('logFileInputRS').click();
  } else {
    document.getElementById('logFileInputWin').click();
  }
}

async function handleLogFile(input, type) {
  const file = input.files?.[0];
  if (!file) return;

  const statusEl = document.getElementById('logUploadStatus');
  statusEl.textContent = 'Parsing screenshot...';
  statusEl.style.display = 'block';

  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/parse-screenshot', { method: 'POST', body: form });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Parse failed');
    if (!data.players?.length) throw new Error('No players found');

    if (type === 'real_scores') {
      LOG.parsedRS = data.players;
      document.getElementById('logUploadRSBtn')?.classList.add('done');
      // Save actuals to GitHub
      await saveLogActuals(data.players);
      // Update cards with actuals
      if (LOG.data) {
        LOG.data.actuals = data.players.map(p => ({
          player_name: p.player_name || p.name || '',
          actual_rs: p.actual_rs ?? '',
        }));
      }
      renderLogDrillCards();
      // Try hindsight if slate
      if (LOG.scope === 'slate') {
        await computeHindsight(data.players);
      }
    } else {
      LOG.parsedWin = data.players;
      document.getElementById('logUploadWinBtn')?.classList.add('done');
      document.getElementById('logUploadGameBtn')?.classList.add('done');
      renderWinningDrafts(data.players);
    }

    statusEl.textContent = 'Uploaded successfully';
    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
  } catch(e) {
    statusEl.textContent = `Error: ${e.message}`;
  }

  input.value = '';
}

async function saveLogActuals(players) {
  try {
    await fetch('/api/save-actuals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: LOG.selectedDate, players }),
    });
  } catch(e) { /* non-fatal */ }
}

async function computeHindsight(players) {
  const hindsightPlayers = players
    .filter(p => p.actual_rs != null && p.actual_rs > 0)
    .map(p => ({
      name: p.player_name || p.name || '',
      actual_rs: p.actual_rs,
      actual_card_boost: p.actual_card_boost || 0.3,
    }));

  if (hindsightPlayers.length < 5) return;

  try {
    const r = await fetch('/api/hindsight', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ players: hindsightPlayers }),
    });
    if (!r.ok) return;
    const data = await r.json();
    LOG.hindsightLineup = data.lineup;
    renderHindsightOptimal(data.lineup);
  } catch(e) { /* non-fatal */ }
}

function renderWinningDrafts(players) {
  const el = document.getElementById('logResultSection');
  let html = el.innerHTML || '';

  // Group by drafter if leaderboard, otherwise show flat list
  const leaderboard = players.filter(p => p.source === 'leaderboard');

  if (!leaderboard.length) {
    // Flat list — top players by total_value
    const sorted = [...players].sort((a,b) => (b.total_value||0) - (a.total_value||0)).slice(0,5);
    html += `<div class="result-section-label"><span class="result-badge win">Top Drafts</span></div>`;
    sorted.forEach((p, i) => {
      html += `
        <div class="winning-draft-card" style="animation-delay:${i*0.07}s">
          <div class="winning-draft-rank">#${i+1} ${p.player_name || '—'}</div>
          <div class="winning-draft-player" style="border-bottom:none">
            <span>Total Value</span>
            <b>${p.total_value || '—'}</b>
          </div>
        </div>`;
    });
  } else {
    // Group by implied drafter — consecutive records
    // (Claude parses leaderboard as flat; group by runs)
    html += `<div class="result-section-label"><span class="result-badge win">Top 3 Winning Drafts</span></div>`;
    // Attempt to group by total_score changes
    const groups = [];
    let cur = null;
    leaderboard.forEach(p => {
      if (p.total_score !== undefined && (!cur || p.total_score !== cur.score)) {
        if (cur) groups.push(cur);
        cur = { score: p.total_score, players: [p] };
      } else if (cur) {
        cur.players.push(p);
      } else {
        cur = { score: null, players: [p] };
      }
    });
    if (cur) groups.push(cur);

    groups.slice(0,3).forEach((g, gi) => {
      html += `
        <div class="winning-draft-card" style="animation-delay:${gi*0.08}s">
          <div class="winning-draft-rank">#${gi+1} Draft${g.score ? ` — <span style="color:var(--log-win)">${g.score}</span>` : ''}</div>
          ${g.players.map(p => `
            <div class="winning-draft-player">
              <b>${p.player_name || '—'}</b>
              <span>RS ${p.actual_rs ?? '—'} × ${p.card_multiplier ?? '—'}</span>
            </div>`).join('')}
        </div>`;
    });
  }

  el.innerHTML = html;
}

function renderHindsightOptimal(lineup) {
  const el = document.getElementById('logResultSection');
  if (!lineup || !lineup.length) return;

  let html = el.innerHTML || '';
  html += `<div class="result-section-label"><span class="result-badge opt">Hindsight Optimal Draft</span></div>`;

  lineup.forEach((p, i) => {
    const tc = TEAM_COLORS[p.team] || '#9b80c8';
    html += `
      <div class="winning-draft-card" style="border-color:rgba(155,128,200,0.25);animation-delay:${i*0.06}s">
        <div class="winning-draft-rank" style="color:var(--log-opt)">${p.slot} — ${p.name}</div>
        <div class="winning-draft-player" style="border-bottom:none">
          <span>Actual RS</span>
          <b style="color:var(--log-opt)">${p.rating}</b>
        </div>
      </div>`;
  });

  el.innerHTML = html;
}
