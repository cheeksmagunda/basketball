<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REAL APP — NBA Draft Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: rgba(12, 18, 28, 0.85);
      --surface2: rgba(20, 30, 48, 0.6);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --chalk: #4f8ef7;
      --chalk-glow: rgba(79,142,247,0.25);
      --upside: #f97316;
      --upside-glow: rgba(249,115,22,0.25);
      --muted: #64748b;
      --text: #e8edf5;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --r: 14px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Court texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      top: -20%;  left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--chalk);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 16px var(--chalk-glow);
    }
    .logo-sub {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.15em; display: block; margin-top: 1px;
    }

    .nav { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
    .nav-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 6px 14px;
      border: none; background: transparent; color: var(--muted);
      border-radius: 7px; cursor: pointer; transition: all 0.2s;
    }
    .nav-btn.active { background: var(--chalk); color: #fff; box-shadow: 0 2px 8px var(--chalk-glow); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── CHALK/UPSIDE TABS ── */
    .mode-tabs {
      display: flex; gap: 6px; margin-bottom: 18px;
    }
    .mode-tab {
      flex: 1; padding: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      cursor: pointer; transition: all 0.25s;
    }
    .mode-tab.active[data-t="chalk"] { background: rgba(79,142,247,0.12); border-color: var(--chalk); color: var(--chalk); }
    .mode-tab.active[data-t="upside"] { background: rgba(249,115,22,0.12); border-color: var(--upside); color: var(--upside); }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 16px 16px 20px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .player-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Left colored accent bar */
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--tcolor, var(--chalk));
      border-radius: 0 3px 3px 0;
      box-shadow: 2px 0 12px var(--tcolor, var(--chalk));
    }

    /* Subtle team color bg wash */
    .player-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 50%, var(--tcolor-alpha, rgba(79,142,247,0.04)) 0%, transparent 60%);
      pointer-events: none;
    }

    .rank-badge {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      color: var(--tcolor, var(--chalk));
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .player-info { position: relative; z-index: 1; min-width: 0; }
    .player-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 3px; display: flex; align-items: center; gap: 6px;
    }
    .pos-pill {
      background: var(--border-bright); border-radius: 3px;
      padding: 1px 5px; font-size: 0.6rem;
    }
    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 800; line-height: 1;
      color: #fff; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Stat pills row */
    .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
      display: flex; align-items: center; gap: 3px;
    }
    .stat-pill b { color: var(--text); font-weight: 700; }
    .stat-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--tcolor, var(--chalk)); opacity: 0.5;
    }

    /* Score column */
    .score-col {
      text-align: right; position: relative; z-index: 1;
      border-left: 1px solid var(--border);
      padding-left: 14px; min-width: 72px;
    }
    .score-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 900; line-height: 1;
      color: var(--score-color, var(--chalk));
    }
    .score-label {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 3px;
    }
    .slot-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      color: var(--score-color, var(--chalk));
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px; padding: 2px 6px;
      display: inline-block; margin-top: 4px;
    }

    /* ── CASCADE & MULT BADGES ── */
    .cascade-badge {
      background: rgba(251,191,36,0.15); color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.3);
      font-size: 0.6rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px; letter-spacing: 0.05em;
    }
    .mult-badge {
      background: rgba(79,142,247,0.1); color: var(--chalk);
      border: 1px solid rgba(79,142,247,0.2);
      font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
    }



    /* ── SKELETON LOADING ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .skel-block {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-circle { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; }
    .skel-line { height: 10px; margin-bottom: 8px; }
    .skel-line.wide { width: 70%; }
    .skel-line.narrow { width: 40%; }
    .skel-score { width: 48px; height: 44px; }

    /* ── GAME SELECTOR ── */
    .game-select-wrap { position: relative; margin-bottom: 12px; }
    .game-select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.9rem;
    }
    select {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 14px 40px 14px 16px;
      border-radius: 12px;
      appearance: none;
      outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--chalk); }

    /* ── ANALYZE BUTTON ── */
    .analyze-btn {
      width: 100%;
      background: var(--chalk);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 15px;
      border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--chalk-glow);
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 24px var(--chalk-glow); }
    .analyze-btn:disabled { opacity: 0.35; filter: grayscale(0.5); transform: none; box-shadow: none; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GAME INFO CHIPS ── */
    .game-chips { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; color: var(--text-dim);
    }
    .chip b { color: var(--text); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin: 28px 0;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    /* ── LAB / HISTORY ── */
    .lab-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .lab-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900; letter-spacing: 0.03em;
    }
    .sync-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--surface2); color: var(--text-dim);
      border: 1px solid var(--border-bright);
      padding: 7px 14px; border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .sync-btn:hover { border-color: var(--chalk); color: var(--chalk); }

    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      margin-bottom: 12px;
    }
    .history-card-header {
      display: flex; justify-content: space-between;
      margin-bottom: 14px;
    }
    .history-game {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem; font-weight: 800; color: var(--text);
    }
    .history-date { font-size: 0.7rem; color: var(--muted); font-weight: 500; }

    .history-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .history-row:last-child { border-bottom: none; padding-bottom: 0; }
    .history-player { font-size: 0.85rem; font-weight: 600; }
    .history-player span { font-size: 0.65rem; color: var(--muted); font-weight: 500; }
    .history-scores { display: flex; align-items: center; gap: 8px; }
    .projected-score { font-size: 0.75rem; color: var(--muted); }
    .actual-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900;
    }
    .actual-score.hit { color: var(--green); }
    .actual-score.miss { color: var(--red); }
    .actual-score.pending { color: var(--muted); }

    /* ── ERROR TOAST ── */
    .error-banner {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem; color: #fda4af;
      margin-bottom: 16px;
      display: none;
    }

    .hidden { display: none !important; }

    /* ── LAB: DAY PICKER ── */
    .day-picker {
      display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 14px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .day-picker::-webkit-scrollbar { display: none; }
    .day-chip {
      flex-shrink: 0; padding: 7px 12px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); cursor: pointer; transition: all 0.2s; position: relative;
      white-space: nowrap;
    }
    .day-chip:hover { border-color: var(--border-bright); color: var(--text-dim); }
    .day-chip.active { background: rgba(79,142,247,0.12); border-color: var(--chalk); color: var(--chalk); }
    .day-chip.has-actuals::after {
      content: ''; position: absolute; top: 4px; right: 4px;
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    }
    .day-chip.no-data { opacity: 0.4; }

    /* ── LAB: DAY DETAIL ── */
    .day-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800;
      letter-spacing: 0.03em; margin-bottom: 14px; color: var(--text);
    }
    .scope-tabs { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; }
    .scope-tab {
      flex-shrink: 0; padding: 6px 12px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      border-radius: 7px; border: 1px solid var(--border); background: var(--surface2);
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .scope-tab.active { background: rgba(79,142,247,0.12); border-color: var(--chalk); color: var(--chalk); }
    .scope-tab.has-actuals::after {
      content: ''; position: absolute; top: 3px; right: 3px;
      width: 5px; height: 5px; border-radius: 50%; background: var(--green);
    }
    .scope-tab { position: relative; }

    .enter-results-btn {
      width: 100%; padding: 12px; margin-top: 14px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      border-radius: 10px; border: 1px solid var(--border-bright); background: var(--surface2);
      color: var(--text-dim); cursor: pointer; transition: all 0.2s;
    }
    .enter-results-btn:hover { border-color: var(--chalk); color: var(--chalk); }
    .enter-results-btn.done { border-color: var(--green); color: var(--green); pointer-events: none; }

    /* ── LAB: COMPARISON ROW ── */
    .comp-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .comp-row:last-child { border-bottom: none; }
    .comp-name { font-size: 0.85rem; font-weight: 600; }
    .comp-scores { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
    .comp-pred { color: var(--muted); }
    .comp-arrow { color: var(--text-dim); font-size: 0.7rem; }
    .comp-actual { font-weight: 700; }
    .comp-actual.hit { color: var(--green); }
    .comp-actual.miss { color: var(--red); }
    .comp-section-label {
      font-size: 0.7rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 6px 0 4px; margin-top: 4px;
    }
    .comp-summary {
      display: flex; gap: 12px; flex-wrap: wrap; padding: 12px 0; font-size: 0.75rem; color: var(--text-dim);
      border-top: 1px solid var(--border); margin-top: 8px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--bg); border: 1px solid var(--border-bright); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: 16px; color: var(--text);
    }
    .score-row {
      display: grid; grid-template-columns: 1fr 50px 70px; gap: 8px; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .score-row-name { font-size: 0.82rem; font-weight: 600; }
    .score-row-pred { font-size: 0.75rem; color: var(--muted); text-align: center; }
    .score-row input {
      background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 8px;
      padding: 8px; color: var(--text); font-size: 0.85rem; font-weight: 600; text-align: center;
      outline: none; width: 100%;
    }
    .score-row input:focus { border-color: var(--chalk); }
    .score-row input.invalid { border-color: var(--red); }
    .score-row input[type="text"] {
      text-align: left; font-weight: 400;
    }
    .remove-row-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 1.2rem; cursor: pointer; padding: 0 4px;
      opacity: 0.3; transition: opacity 0.15s;
    }
    .remove-row-btn:hover { opacity: 1; color: var(--red); }
    .modal-cancel {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
    }
    .modal-submit {
      flex: 2; padding: 10px; border-radius: 10px; border: none;
      background: var(--chalk); color: #fff; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-submit:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🏀</div>
      <div>
        REAL APP
        <span class="logo-sub">NBA Draft Optimizer</span>
      </div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" id="navOptimizer" onclick="switchNav('optimizer')">Optimizer</button>
      <button class="nav-btn" id="navLab" onclick="switchNav('lab')">Lab</button>
    </nav>
  </header>

  <!-- ══ OPTIMIZER VIEW ══ -->
  <div id="viewOptimizer">

    <!-- Today's Top 5 (slate) -->
    <div class="section-label">Today's Top 5</div>
    <div id="slateChips" class="game-chips"></div>

    <div class="mode-tabs" id="slateTabs" style="display:none">
      <button class="mode-tab active" data-t="chalk" onclick="switchSlate('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchSlate('upside')">🚀 Moonshot</button>
    </div>

    <div id="slateList"></div>

    <div class="divider"></div>

    <!-- Game Picker -->
    <div class="section-label">Game Analysis</div>
    <div id="errorBanner" class="error-banner"></div>
    <div class="game-select-wrap">
      <select id="gameSel"><option value="">Loading games...</option></select>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled onclick="runAnalysis()">
      Analyze Draft
    </button>

    <div class="mode-tabs" id="picksTabsWrap" style="display:none; margin-top:0;">
      <button class="mode-tab active" data-t="chalk" onclick="switchPicksTab('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchPicksTab('upside')">🚀 Moonshot</button>
    </div>
    <div id="picksList"></div>

  </div>

  <!-- ══ LAB VIEW ══ -->
  <div id="viewLab" class="hidden">
    <div class="lab-header">
      <span class="lab-title">History</span>
    </div>

    <!-- Day Picker -->
    <div class="day-picker" id="dayPicker"></div>

    <!-- Day Detail -->
    <div id="dayDetail"></div>

    <!-- Score Entry Modal -->
    <div class="modal-overlay hidden" id="entryModal">
      <div class="modal-box">
        <div class="modal-header" id="modalHeader">Enter Actual Scores</div>
        <div id="screenshotPreview" style="display:none;margin-bottom:12px">
          <img id="screenshotImg" style="width:100%;border-radius:8px;border:1px solid var(--border)">
        </div>
        <label class="attach-btn" style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.75rem;color:var(--text-dim);margin-bottom:14px">
          <input type="file" accept="image/*" id="screenshotInput" style="display:none" onchange="previewScreenshot(this)">
          📷 Attach screenshot for reference
        </label>
        <div id="modalScoreRows"></div>
        <button type="button" id="addPlayerBtn" onclick="addResultRow('', null)" style="display:none;background:none;border:1px dashed var(--border-bright);border-radius:8px;padding:8px;width:100%;color:var(--text-dim);font-size:0.8rem;cursor:pointer;margin-top:6px;transition:border-color 0.15s">+ Add Player</button>
        <div id="modalError" style="color:var(--red);font-size:0.75rem;margin:8px 0;display:none"></div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="modal-cancel" onclick="closeEntryModal()">Cancel</button>
          <button class="modal-submit" id="modalSubmitBtn" disabled onclick="submitActuals()">Submit Results</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const TEAM_COLORS = {
  ATL:"#e03a3e",BOS:"#007A33",BKN:"#aaaaaa",CHA:"#00788c",CHI:"#ce1141",
  CLE:"#860038",DAL:"#00538c",DEN:"#fdb927",DET:"#c8102E",GSW:"#1d428a",
  HOU:"#ce1141",IND:"#fdbb30",LAC:"#c8102E",LAL:"#fdb927",MEM:"#5d76a9",
  MIA:"#98002E",MIL:"#00471B",MIN:"#0c2340",NOP:"#85714d",NYK:"#f58426",
  OKC:"#007ac1",ORL:"#0077c0",PHI:"#006bb6",PHX:"#e56020",POR:"#E03A3E",
  SAC:"#5a2d81",SAS:"#c4ced4",TOR:"#ce1141",UTA:"#f9a01b",WAS:"#002B5C"
};

let SLATE = null;
let PICKS_DATA = null;
let CURRENT_SLATE_TAB = 'chalk';
let LAB_ACTIVE_DATE = null;
let LAB_ACTIVE_SCOPE = null;
let MODAL_DATE = null;
let MODAL_SCOPE = null;
let MODAL_ROW_COUNT = 0;
let LAB_DAY_DATA = null;  // in-memory dayData including auto-generated game tabs

// ── LOCALSTORAGE HELPERS ──
const LAB_KEY = 'nba_lab_history';
const CAL_KEY = 'nba_calibration';

function labLoad() {
  try { return JSON.parse(localStorage.getItem(LAB_KEY)) || {}; }
  catch { return {}; }
}
function labSave(data) {
  try { localStorage.setItem(LAB_KEY, JSON.stringify(data)); }
  catch(e) { console.warn('Lab save failed:', e); }
}
function labSaveDay(date, scope, predictions) {
  const data = labLoad();
  if (!data[date]) data[date] = {};
  data[date][scope] = { predictions, savedAt: new Date().toISOString() };
  labSave(data);
}
function labSaveActuals(date, scope, actuals) {
  const data = labLoad();
  if (!data[date]) data[date] = {};
  if (!data[date][scope]) data[date][scope] = {};
  data[date][scope].actuals = actuals;
  data[date][scope].actualsAt = new Date().toISOString();
  labSave(data);
}
function calLoad() {
  try { return JSON.parse(localStorage.getItem(CAL_KEY)) || { bias: 0, samples: 0 }; }
  catch { return { bias: 0, samples: 0 }; }
}
function calSave(cal) {
  try { localStorage.setItem(CAL_KEY, JSON.stringify(cal)); }
  catch(e) { console.warn('Cal save failed:', e); }
}
function getCalBias() {
  const cal = calLoad();
  return cal.samples >= 5 ? cal.bias : 0;
}

// ── INIT ──
(async function init() {
  loadSlate();
  initGameSelector();
})();

async function initGameSelector() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  try {
    const r = await fetch('/api/games');
    const games = await r.json();
    if (!games.length) {
      sel.innerHTML = '<option value="">No games today</option>';
      return;
    }
    sel.innerHTML = '<option value="">Select a game...</option>';
    games.forEach(g => {
      const o = document.createElement('option');
      o.value = g.gameId;
      o.textContent = g.label + (g.total ? ` · O/U ${g.total}` : '');
      sel.appendChild(o);
    });
    sel.onchange = () => { btn.disabled = !sel.value; };
  } catch(e) {
    sel.innerHTML = '<option value="">Offline — check backend</option>';
  }
}

// ── SLATE ──
async function loadSlate() {
  renderSkeletons('slateList', 5);
  try {
    const bias = getCalBias();
    const url = bias ? `/api/slate?cal_bias=${bias}` : '/api/slate';
    const r = await fetch(url);
    if (!r.ok) throw new Error('Slate fetch failed');
    SLATE = await r.json();
    document.getElementById('slateTabs').style.display = 'flex';

    // Auto-save to lab
    if (SLATE.date) {
      labSaveDay(SLATE.date, 'slate', {
        chalk: SLATE.lineups.chalk,
        upside: SLATE.lineups.upside,
        games: SLATE.games
      });
    }

    const chips = document.getElementById('slateChips');
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    chips.innerHTML = `
      <div class="chip"><b>${SLATE.games.length}</b> Games</div>
      <div class="chip">🏀 ${dateStr}</div>
    `;
    switchSlate('chalk');
  } catch(e) {
    document.getElementById('slateList').innerHTML = `
      <div class="empty-state">
        <span class="icon">📡</span>
        <p>Couldn't load today's slate.<br>Make sure the API server is running.</p>
      </div>`;
  }
}

function switchPicksTab(tab) {
  document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (PICKS_DATA) renderCards(PICKS_DATA.lineups[tab] || [], 'picksList', tab);
}

function switchSlate(tab) {
  CURRENT_SLATE_TAB = tab;
  document.querySelectorAll('#slateTabs .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (SLATE) renderCards(SLATE.lineups[tab] || [], 'slateList', tab);
}

// ── ANALYSIS ──
async function runAnalysis() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  const banner = document.getElementById('errorBanner');
  const gameId = sel.value;
  if (!gameId) return;

  banner.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  renderSkeletons('picksList', 5);

  try {
    const bias = getCalBias();
    const biasParam = bias ? `&cal_bias=${bias}` : '';
    const r = await fetch(`/api/picks?gameId=${gameId}${biasParam}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Server error' }));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    PICKS_DATA = await r.json();
    document.getElementById('picksTabsWrap').style.display = 'flex';
    renderCards(PICKS_DATA.lineups.chalk, 'picksList', 'chalk');

    // Auto-save to lab
    if (PICKS_DATA.date) {
      const label = sel.options[sel.selectedIndex].textContent;
      labSaveDay(PICKS_DATA.date, `game_${gameId}`, {
        chalk: PICKS_DATA.lineups.chalk,
        upside: PICKS_DATA.lineups.upside,
        gameLabel: label
      });
    }
  } catch(e) {
    document.getElementById('picksList').innerHTML = '';
    banner.textContent = `⚠ ${e.message}`;
    banner.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Draft';
  }
}

// ── RENDER CARDS ──
function renderCards(picks, containerId, mode) {
  const el = document.getElementById(containerId);
  if (!picks || !picks.length) {
    el.innerHTML = `<div class="empty-state"><span class="icon">🏀</span><p>No players to display yet.</p></div>`;
    return;
  }

  const isUpside = mode === 'upside';
  const scoreColor = isUpside ? 'var(--upside)' : 'var(--chalk)';

  el.innerHTML = picks.map((p, i) => {
    const tc = TEAM_COLORS[p.team] || '#4f8ef7';
    const tcAlpha = tc.replace('#', '').match(/.{2}/g)
      ? `rgba(${parseInt(tc.slice(1,3),16)},${parseInt(tc.slice(3,5),16)},${parseInt(tc.slice(5,7),16)},0.08)`
      : 'rgba(79,142,247,0.08)';

    const multBadge = p.est_mult ? `<span class="mult-badge">${p.est_mult}x est</span>` : '';

    const statsHtml = [
      multBadge,
      p.predMin && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.predMin}</b> min</div>`,
      p.pts      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.pts}</b> pts</div>`,
      p.reb      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.reb}</b> reb</div>`,
      p.ast      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.ast}</b> ast</div>`,
      p.stl      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.stl}</b> stl</div>`,
      p.blk      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.blk}</b> blk</div>`,
      (p._decline && p._decline < 0.85) && `<div class="stat-pill" style="color:#f43f5e"><b>↓${Math.round((1-p._decline)*100)}%</b> usage</div>`,
    ].filter(Boolean).join('');

    return `
      <div class="player-card" style="--tcolor:${tc};--tcolor-alpha:${tcAlpha};animation-delay:${i*0.06}s">
        <div class="rank-badge">${p.slot}</div>
        <div class="player-info">
          <div class="player-meta">
            ${p.team || '—'} <span class="pos-pill">${p.pos}</span>
          </div>
          <div class="player-name">${p.name}</div>
          <div class="stat-pills">${statsHtml}</div>
        </div>
        <div class="score-col" style="--score-color:${scoreColor}">
          <div class="score-num">${p.rating}</div>
          <span class="score-label">${isUpside ? 'moonshot' : 'projected'}</span>
          <div class="slot-badge" style="background:${isUpside?'rgba(249,115,22,0.1)':'rgba(79,142,247,0.1)'};border-color:${isUpside?'rgba(249,115,22,0.25)':'rgba(79,142,247,0.25)'}">
            ${p.slot}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── SKELETON ──
function renderSkeletons(containerId, count) {
  document.getElementById(containerId).innerHTML = Array.from({length: count}, (_, i) => `
    <div class="skeleton" style="animation-delay:${i*0.07}s">
      <div class="skel-block skel-circle"></div>
      <div class="skel-lines">
        <div class="skel-block skel-line wide"></div>
        <div class="skel-block skel-line narrow"></div>
      </div>
      <div class="skel-block skel-score"></div>
    </div>`).join('');
}

// ── NAV ──
function switchNav(view) {
  const isLab = view === 'lab';
  document.getElementById('viewOptimizer').classList.toggle('hidden', isLab);
  document.getElementById('viewLab').classList.toggle('hidden', !isLab);
  document.getElementById('navOptimizer').classList.toggle('active', !isLab);
  document.getElementById('navLab').classList.toggle('active', isLab);
  if (isLab) initLab();
}

// ── LAB ──
async function initLab() {
  await migrateHistory();
  renderDayPicker();
  const data = labLoad();
  const dates = Object.keys(data).sort().reverse();
  if (dates.length > 0) {
    loadDay(LAB_ACTIVE_DATE && data[LAB_ACTIVE_DATE] ? LAB_ACTIVE_DATE : dates[0]);
  } else {
    document.getElementById('dayDetail').innerHTML =
      '<div class="empty-state"><span class="icon">📋</span><p>No predictions saved yet.<br>Run an analysis from the Optimizer to start tracking.</p></div>';
  }
}

async function migrateHistory() {
  if (localStorage.getItem('nba_lab_migrated')) return;
  try {
    const r = await fetch('/api/history');
    const history = await r.json();
    if (!Array.isArray(history) || !history.length) {
      localStorage.setItem('nba_lab_migrated', '1');
      return;
    }
    const data = labLoad();
    history.forEach(h => {
      const date = (h.timestamp || '').slice(0, 10);
      if (!date) return;
      const gameKey = h.game ? `game_${h.game.replace(/\s/g, '_')}` : 'slate';
      if (!data[date]) data[date] = {};
      if (!data[date][gameKey]) {
        data[date][gameKey] = {
          predictions: {
            chalk: (h.players || []).map(p => ({
              name: p.name, rating: p.rating, team: p.team || '', pos: p.pos || ''
            })),
            gameLabel: h.game || 'Slate'
          },
          savedAt: h.timestamp
        };
      }
    });
    labSave(data);
    localStorage.setItem('nba_lab_migrated', '1');
  } catch(e) {
    console.warn('History migration failed:', e);
  }
}

function renderDayPicker() {
  const picker = document.getElementById('dayPicker');
  const data = labLoad();
  const days = [];
  const start = new Date('2025-03-02T12:00:00');
  const today = new Date();
  today.setHours(12, 0, 0, 0);
  for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
    days.push(d.toISOString().slice(0, 10));
  }
  picker.innerHTML = days.map(d => {
    const dayData = data[d];
    const hasData = dayData && Object.keys(dayData).length > 0;
    const hasActuals = hasData && Object.values(dayData).some(s => s.actuals);
    const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const cls = [
      'day-chip',
      d === LAB_ACTIVE_DATE ? 'active' : '',
      hasActuals ? 'has-actuals' : ''
    ].filter(Boolean).join(' ');
    return `<button class="${cls}" onclick="loadDay('${d}')">${label}</button>`;
  }).reverse().join('');
}

function loadDay(date) {
  LAB_ACTIVE_DATE = date;
  renderDayPicker();

  const data = labLoad();
  const dayData = data[date] || {};
  const detail = document.getElementById('dayDetail');
  LAB_DAY_DATA = dayData;

  if (Object.keys(dayData).length === 0) {
    const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    detail.innerHTML = `
      <div class="day-title">${dateLabel}</div>
      <div class="empty-state" style="margin-bottom:14px">
        <span class="icon">📋</span>
        <p>No predictions saved for this day.</p>
      </div>
      <button class="enter-results-btn" onclick="openEntryModal('${date}','manual')">Enter Results Manually</button>
    `;
    return;
  }

  // Auto-generate per-game tabs from slate's games list
  const slateGames = dayData['slate']?.predictions?.games;
  if (slateGames && Array.isArray(slateGames)) {
    slateGames.forEach(g => {
      const gameKey = `game_${g.gameId}`;
      if (!dayData[gameKey]) {
        dayData[gameKey] = {
          predictions: { chalk: [], gameLabel: g.label || 'Game' },
          savedAt: dayData['slate']?.savedAt
        };
      }
    });
  }

  const scopes = Object.keys(dayData);
  const activeScope = LAB_ACTIVE_SCOPE && scopes.includes(LAB_ACTIVE_SCOPE) ? LAB_ACTIVE_SCOPE : scopes[0];
  LAB_ACTIVE_SCOPE = activeScope;

  const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  const tabsHtml = scopes.map(s => {
    let label;
    if (s === 'slate') label = 'Full Slate';
    else if (s === 'manual') label = 'Manual';
    else label = dayData[s].predictions?.gameLabel || s.replace('game_', '');
    const hasActuals = dayData[s]?.actuals?.length > 0;
    const active = s === activeScope ? 'active' : '';
    return `<button class="scope-tab ${active}${hasActuals ? ' has-actuals' : ''}" onclick="switchLabScope('${date}','${s}')">${label}</button>`;
  }).join('');

  detail.innerHTML = `
    <div class="day-title">${dateLabel}</div>
    <div class="scope-tabs">${tabsHtml}</div>
    <div id="labScopeContent"></div>
  `;
  renderLabScope(date, activeScope);
}

function switchLabScope(date, scope) {
  LAB_ACTIVE_SCOPE = scope;
  loadDay(date);
}

function renderLabScope(date, scope) {
  const data = labLoad();
  // Try localStorage first, fall back to in-memory dayData (auto-generated game tabs)
  const scopeData = data[date]?.[scope] || LAB_DAY_DATA?.[scope];
  const el = document.getElementById('labScopeContent');

  if (!scopeData) {
    el.innerHTML = `
      <div class="empty-state" style="margin-bottom:14px"><span class="icon">📋</span><p>No predictions for this game.</p></div>
      <button class="enter-results-btn" onclick="openEntryModal('${date}','${scope}')">Enter Results</button>`;
    return;
  }

  const preds = scopeData.predictions || {};
  const actuals = scopeData.actuals;
  const players = preds.chalk || [];

  if (actuals && actuals.length) {
    // Comparison view — Our Picks + Leaderboard Players
    let html = '<div style="margin-bottom:12px">';

    // Our Picks section (only if we had predictions)
    if (players.length > 0) {
      html += '<div class="comp-section-label">Our Picks</div>';
      players.forEach(p => {
        const actual = actuals.find(a => a.name === p.name);
        const score = actual?.score;
        const diff = score != null ? score - p.rating : null;
        const cls = diff != null ? (diff >= 0 ? 'hit' : 'miss') : '';
        html += `
          <div class="comp-row">
            <div class="comp-name">${p.name}${!actual ? ' <span style="opacity:0.4;font-size:0.75rem">not in results</span>' : ''}</div>
            <div class="comp-scores">
              <span class="comp-pred">proj ${p.rating}</span>
              <span class="comp-arrow">&rarr;</span>
              <span class="comp-actual ${cls}">${score != null ? score : '—'}</span>
            </div>
          </div>`;
      });
    }

    // Leaderboard Players (ones we didn't predict)
    const predNames = new Set(players.map(p => p.name));
    const extras = actuals.filter(a => !predNames.has(a.name));
    if (extras.length > 0) {
      html += '<div class="comp-section-label" style="margin-top:12px">Leaderboard Players</div>';
      extras.sort((a, b) => (b.score || 0) - (a.score || 0));
      extras.forEach(a => {
        html += `
          <div class="comp-row">
            <div class="comp-name">${a.name}</div>
            <div class="comp-scores">
              <span class="comp-actual">${a.score != null ? a.score : '—'}</span>
            </div>
          </div>`;
      });
    }

    // Summary
    const scored = actuals.filter(a => a.score != null);
    if (scored.length) {
      const totalActual = scored.reduce((s, a) => s + a.score, 0);
      const matchedPicks = players.filter(p => actuals.find(a => a.name === p.name && a.score != null));
      const totalPred = matchedPicks.reduce((s, p) => s + p.rating, 0);
      const hits = matchedPicks.filter(p => {
        const a = actuals.find(a => a.name === p.name);
        return a && a.score >= p.rating;
      }).length;
      html += `
        <div class="comp-summary">
          ${matchedPicks.length > 0 ? `<span>Predicted: <b>${totalPred.toFixed(1)}</b></span>` : ''}
          <span>Total actual: <b>${totalActual.toFixed(1)}</b></span>
          ${matchedPicks.length > 0 ? `<span>Hit rate: <b>${hits}/${matchedPicks.length}</b></span>` : ''}
          <span>Players: <b>${scored.length}</b></span>
        </div>`;
    }
    html += '</div>';
    html += `<button class="enter-results-btn" onclick="openEntryModal('${date}','${scope}')">Edit Results</button>`;
    el.innerHTML = html;
  } else {
    // Show predictions + enter results button
    if (players.length > 0) {
      let html = '<div id="labCardsList"></div>';
      html += `<button class="enter-results-btn" onclick="openEntryModal('${date}','${scope}')">Enter Actual Results</button>`;
      el.innerHTML = html;
      renderCards(players, 'labCardsList', 'chalk');
    } else {
      el.innerHTML = `
        <div class="empty-state" style="margin-bottom:14px"><span class="icon">📋</span><p>No predictions for this view.</p></div>
        <button class="enter-results-btn" onclick="openEntryModal('${date}','${scope}')">Enter Results</button>`;
    }
  }
}

// ── SCORE ENTRY MODAL ──
function openEntryModal(date, scope) {
  MODAL_DATE = date;
  MODAL_SCOPE = scope;
  MODAL_ROW_COUNT = 0;

  const data = labLoad();
  const scopeData = data[date]?.[scope] || LAB_DAY_DATA?.[scope];
  const preds = scopeData?.predictions;
  const players = preds?.chalk || [];
  const existing = scopeData?.actuals;

  const header = document.getElementById('modalHeader');
  const rows = document.getElementById('modalScoreRows');
  header.textContent = scope === 'slate' ? 'Enter Slate Results'
    : scope === 'manual' ? 'Enter Results'
    : `Enter Results — ${preds?.gameLabel || 'Game'}`;

  rows.innerHTML = '';

  // If re-editing, pre-fill from existing actuals
  if (existing && existing.length) {
    existing.forEach(a => {
      const pred = players.find(p => p.name === a.name);
      addResultRow(a.name, pred?.rating || null, a.score);
    });
  } else if (players.length > 0) {
    // Pre-fill with our predictions
    players.forEach(p => addResultRow(p.name, p.rating, null));
    // Add empty rows for leaderboard players we didn't predict
    for (let i = 0; i < 3; i++) addResultRow('', null, null);
  } else {
    // No predictions — all blank rows
    for (let i = 0; i < 5; i++) addResultRow('', null, null);
  }

  document.getElementById('addPlayerBtn').style.display = 'block';
  document.getElementById('modalError').style.display = 'none';
  document.getElementById('screenshotPreview').style.display = 'none';
  document.getElementById('screenshotInput').value = '';
  document.getElementById('modalSubmitBtn').disabled = true;
  document.getElementById('entryModal').classList.remove('hidden');
  validateResultInputs();
}

function addResultRow(name, projRating, existingScore) {
  const idx = MODAL_ROW_COUNT++;
  const rows = document.getElementById('modalScoreRows');
  const row = document.createElement('div');
  row.className = 'score-row';
  row.id = `resultRow_${idx}`;
  row.style.gridTemplateColumns = '1fr auto 70px 28px';
  row.innerHTML = `
    <input type="text" value="${name || ''}" placeholder="Player name" id="resultName_${idx}"
           oninput="validateResultInputs()">
    ${projRating ? `<span class="score-row-pred">proj ${projRating}</span>` : '<span></span>'}
    <input type="number" min="0" max="150" step="0.1" placeholder="Score"
           id="resultScore_${idx}" value="${existingScore != null ? existingScore : ''}"
           oninput="validateResultInputs()">
    <button type="button" class="remove-row-btn" onclick="removeResultRow(${idx})" title="Remove">&times;</button>
  `;
  rows.appendChild(row);
}

function removeResultRow(idx) {
  const row = document.getElementById(`resultRow_${idx}`);
  if (row) row.remove();
  validateResultInputs();
}

function closeEntryModal() {
  document.getElementById('entryModal').classList.add('hidden');
  document.getElementById('addPlayerBtn').style.display = 'none';
  MODAL_DATE = null;
  MODAL_SCOPE = null;
}

function previewScreenshot(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('screenshotImg').src = e.target.result;
      document.getElementById('screenshotPreview').style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function validateResultInputs() {
  const rowEls = document.querySelectorAll('[id^="resultRow_"]');
  let filledCount = 0;
  let hasInvalid = false;

  rowEls.forEach(row => {
    const idx = row.id.replace('resultRow_', '');
    const nameEl = document.getElementById(`resultName_${idx}`);
    const scoreEl = document.getElementById(`resultScore_${idx}`);
    const name = nameEl.value.trim();
    const val = scoreEl.value.trim();

    // Both empty = skip (ok)
    if (!name && !val) {
      scoreEl.classList.remove('invalid');
      return;
    }
    // One filled, one empty = incomplete
    if (!name || !val) { hasInvalid = true; scoreEl.classList.remove('invalid'); return; }
    // Both filled — validate score
    const num = parseFloat(val);
    if (isNaN(num) || num < 0 || num > 150) {
      scoreEl.classList.add('invalid');
      hasInvalid = true;
    } else {
      scoreEl.classList.remove('invalid');
      filledCount++;
    }
  });

  const valid = filledCount >= 1 && !hasInvalid;
  document.getElementById('modalSubmitBtn').disabled = !valid;
  const err = document.getElementById('modalError');
  err.style.display = hasInvalid ? 'block' : 'none';
  err.textContent = hasInvalid ? 'Fill both name and score (0-150) for each row, or leave both empty.' : '';
}

async function submitActuals() {
  // Collect all filled rows
  const rowEls = document.querySelectorAll('[id^="resultRow_"]');
  const data = labLoad();
  const scopeData = data[MODAL_DATE]?.[MODAL_SCOPE] || LAB_DAY_DATA?.[MODAL_SCOPE];
  const players = scopeData?.predictions?.chalk || [];

  const actuals = [];
  rowEls.forEach(row => {
    const idx = row.id.replace('resultRow_', '');
    const name = document.getElementById(`resultName_${idx}`).value.trim();
    const val = document.getElementById(`resultScore_${idx}`).value.trim();
    if (!name || !val) return;
    const score = parseFloat(val);
    const pred = players.find(p => p.name === name);
    actuals.push({
      name,
      predicted_rating: pred?.rating || 0,
      actual_score: score,
      score
    });
  });

  if (!actuals.length) return;

  // Ensure scope exists in localStorage
  if (!data[MODAL_DATE]) data[MODAL_DATE] = {};
  if (!data[MODAL_DATE][MODAL_SCOPE]) {
    data[MODAL_DATE][MODAL_SCOPE] = {
      predictions: scopeData?.predictions || {
        chalk: actuals.map(a => ({ name: a.name, rating: a.predicted_rating, team: '', pos: '' })),
        gameLabel: scopeData?.predictions?.gameLabel || (MODAL_SCOPE === 'slate' ? 'Slate' : 'Game')
      },
      savedAt: new Date().toISOString()
    };
  }
  data[MODAL_DATE][MODAL_SCOPE].actuals = actuals;
  data[MODAL_DATE][MODAL_SCOPE].actualsAt = new Date().toISOString();
  labSave(data);

  // Send to backend for calibration
  try {
    const r = await fetch('/api/actuals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: MODAL_DATE, scope: MODAL_SCOPE, scores: actuals })
    });
    if (r.ok) {
      const result = await r.json();
      if (result.calibration) calSave(result.calibration);
    }
  } catch(e) {
    console.warn('Backend calibration sync failed:', e);
  }

  closeEntryModal();
  loadDay(MODAL_DATE);
  renderDayPicker();
}
</script>
