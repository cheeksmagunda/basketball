<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oracle — NBA Draft Optimizer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Oracle">
  <meta name="application-name" content="The Oracle">
  <meta name="theme-color" content="#060a0f">
  <meta property="og:title" content="The Oracle — NBA Draft Optimizer">
  <meta property="og:description" content="AI-powered NBA draft optimizer for the Real Sports App with game script analysis and calibration feedback.">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: rgba(12, 18, 28, 0.85);
      --surface2: rgba(20, 30, 48, 0.6);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --chalk: #4f8ef7;
      --chalk-glow: rgba(79,142,247,0.25);
      --upside: #f97316;
      --upside-glow: rgba(249,115,22,0.25);
      --muted: #64748b;
      --text: #e8edf5;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --r: 14px;
      /* Line page accent — gold */
      --line: #d4a640;
      --line-glow: rgba(212,166,64,0.22);
      /* Lab page accent — teal */
      --lab: #14b8a6;
      --lab-glow: rgba(20,184,166,0.22);
      /* Log page palette — desaturated/cooler, WCAG AA on dark bg */
      --log-chalk: #7ba4c8;
      --log-chalk-glow: rgba(123,164,200,0.2);
      --log-upside: #b89878;
      --log-upside-glow: rgba(184,152,120,0.2);
      --log-win: #d4a640;
      --log-win-glow: rgba(212,166,64,0.2);
      --log-opt: #9b80c8;
      --log-opt-glow: rgba(155,128,200,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Court texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -20%;  left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 0 16px 170px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--chalk);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      box-shadow: 0 0 12px var(--chalk-glow);
    }
    .logo-sub {
      font-size: 0.55rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.14em; display: block; margin-top: 1px;
    }

    /* ── BOTTOM TAB NAVIGATION — Dribbble floating card style ── */
    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 468px;
      background: rgba(14, 18, 32, 0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 26px;
      padding: 10px 10px 12px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.06) inset;
      z-index: 1000;
    }
    /* Icon row — acts as a visible "tray" */
    .bnav-icon-row {
      display: flex;
      gap: 3px;
      background: rgba(255,255,255,0.055);
      border-radius: 20px;
      padding: 5px;
    }
    .bnav-icon-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      padding: 14px 8px 12px;
      border: none; background: transparent; border-radius: 16px;
      cursor: pointer; transition: all 0.25s ease;
      color: rgba(255,255,255,0.30);
    }
    .bnav-icon-btn:hover { color: rgba(255,255,255,0.55); }
    .bnav-icon-btn.active {
      background: rgba(255,255,255,0.13);
      border: none;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.10) inset;
      color: #fff;
    }
    .bnav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .bnav-icon svg { width: 26px; height: 26px; display: block; }
    .bnav-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; line-height: 1;
    }

    /* Contextual sub-nav — separate floating pill above bottom tab bar */
    .predict-sub-nav {
      position: fixed;
      bottom: 134px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(14, 18, 32, 0.94);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 50px;
      padding: 4px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.50), 0 1px 0 rgba(255,255,255,0.05) inset;
      z-index: 999;
    }
    .predict-sub-btn {
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 7px 22px;
      border-radius: 50px;
      border: none;
      outline: none;
      background: transparent;
      color: rgba(255,255,255,0.38);
      cursor: pointer;
      transition: all 0.22s ease;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .predict-sub-btn.active {
      background: rgba(255,255,255,0.13);
      color: #fff;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.08) inset;
    }
    .predict-sub-btn:hover:not(.active) { color: rgba(255,255,255,0.65); }

    /* Predict sub-pages */
    .predict-sub-page { display: none; }
    /* padding-bottom clears the fixed sub-nav (bottom:134px + ~44px height) above the nav bar */
    .predict-sub-page.active { display: block; padding-bottom: 100px; }

    /* ── TAB PAGES ── */
    .tab-page { display: none; }
    .tab-page.active { display: block; padding-top: 20px; }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── CHALK/UPSIDE TABS ── */
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .mode-tab {
      flex: 1; padding: 9px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 11px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      cursor: pointer; transition: all 0.22s;
    }
    .mode-tab.active[data-t="chalk"] { background: rgba(79,142,247,0.1); border-color: rgba(79,142,247,0.4); color: var(--chalk); }
    .mode-tab.active[data-t="upside"] { background: rgba(249,115,22,0.1); border-color: rgba(249,115,22,0.4); color: var(--upside); }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 14px 14px 18px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .player-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Left colored accent bar */
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--tcolor, var(--chalk));
      border-radius: 0 3px 3px 0;
      box-shadow: 2px 0 12px var(--tcolor, var(--chalk));
    }

    /* Subtle team color bg wash */
    .player-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 50%, var(--tcolor-alpha, rgba(79,142,247,0.04)) 0%, transparent 60%);
      pointer-events: none;
    }

    .rank-badge {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      color: var(--tcolor, var(--chalk));
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .player-info { position: relative; z-index: 1; min-width: 0; }
    .player-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 3px; display: flex; align-items: center; gap: 6px;
    }
    .pos-pill {
      background: var(--border-bright); border-radius: 3px;
      padding: 1px 5px; font-size: 0.6rem;
    }
    .injury-badge {
      background: rgba(244,63,94,0.15); color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.3); border-radius: 3px;
      padding: 1px 5px; font-size: 0.55rem; font-weight: 800;
      letter-spacing: 0.08em;
    }
    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem; font-weight: 800; line-height: 1;
      color: #fff; margin-bottom: 6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
      display: flex; align-items: center; gap: 3px;
    }
    .stat-pill b { color: var(--text); font-weight: 700; }
    .stat-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--tcolor, var(--chalk)); opacity: 0.5;
    }

    .score-col {
      text-align: right; position: relative; z-index: 1;
      border-left: 1px solid var(--border);
      padding-left: 12px; min-width: 66px;
    }
    .score-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 900; line-height: 1;
      color: var(--score-color, var(--chalk));
    }
    .score-label {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 3px;
    }
    .slot-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      color: var(--score-color, var(--chalk));
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px; padding: 2px 6px;
      display: inline-block; margin-top: 4px;
    }

    .mult-badge {
      background: rgba(79,142,247,0.1); color: var(--chalk);
      border: 1px solid rgba(79,142,247,0.2);
      font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
    }

    /* ── SKELETON LOADING ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .skel-block {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-circle { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; }
    .skel-line { height: 10px; margin-bottom: 8px; }
    .skel-line.wide { width: 70%; }
    .skel-line.narrow { width: 40%; }
    .skel-score { width: 48px; height: 44px; }

    /* ── GAME SELECTOR ── */
    .game-select-wrap { position: relative; margin-bottom: 10px; }
    .game-select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.9rem;
    }
    select {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 14px 40px 14px 16px;
      border-radius: 12px;
      appearance: none;
      outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--chalk); }

    /* ── BUTTONS ── */
    .analyze-btn {
      width: 100%;
      background: var(--chalk);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 13px;
      border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 3px 16px var(--chalk-glow);
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 24px var(--chalk-glow); }
    .analyze-btn:disabled { opacity: 0.35; filter: grayscale(0.5); transform: none; box-shadow: none; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-btn {
      background: none; border: none; color: var(--text-dim);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; cursor: pointer; padding: 4px 0 16px;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }

    /* ── GAME INFO CHIPS ── */
    .game-chips { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 8px; color: var(--text-dim);
    }
    .chip b { color: var(--text); }

    .lock-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94,0.25);
      color: #22c55e;
      padding: 5px 10px; border-radius: 8px;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin: 20px 0;
    }

    /* ── EMPTY/PLACEHOLDER STATE ── */
    .empty-state {
      text-align: center; padding: 36px 20px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--muted);
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
    .empty-state p { font-size: 0.82rem; line-height: 1.55; }

    .placeholder-page {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 40vh; text-align: center; padding: 48px 24px;
    }
    .placeholder-page .pl-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .placeholder-page h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }
    .placeholder-page p { font-size: 0.8rem; color: var(--muted); }

    /* ── ERROR BANNER ── */
    .error-banner {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem; color: #fda4af;
      margin-bottom: 16px;
      display: none;
    }

    .hidden { display: none !important; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--bg); border: 1px solid var(--border-bright); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: 16px; color: var(--text);
    }
    .score-row {
      display: grid; grid-template-columns: 1fr 50px 70px; gap: 8px; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .score-row-name { font-size: 0.82rem; font-weight: 600; }
    .score-row-pred { font-size: 0.75rem; color: var(--muted); text-align: center; }
    .score-row input {
      background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 8px;
      padding: 8px; color: var(--text); font-size: 0.85rem; font-weight: 600; text-align: center;
      outline: none; width: 100%;
    }
    .score-row input:focus { border-color: var(--chalk); }
    .score-row input[type="text"] { text-align: left; font-weight: 400; }
    .modal-cancel {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--border-bright); color: var(--text-dim); }
    .modal-submit {
      flex: 2; padding: 10px; border-radius: 10px; border: none;
      background: var(--chalk); color: #fff; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-submit:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── LOG PAGE SPECIFIC ── */

    /* Date strip */
    .date-strip {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px;
      scrollbar-width: none;
    }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-chip {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      min-width: 52px;
    }
    .date-chip:hover { border-color: var(--border-bright); }
    .date-chip.active {
      background: rgba(79,142,247,0.12);
      border-color: var(--chalk);
    }
    .date-chip-day {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .date-chip.active .date-chip-day { color: var(--chalk); }
    .date-chip-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900; color: var(--text-dim); line-height: 1;
    }
    .date-chip.active .date-chip-num { color: var(--chalk); }
    .date-chip-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--log-win); opacity: 0.8;
    }
    .date-chip-dot.hidden-dot { opacity: 0; }

    /* Log game grid */
    .log-game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .log-slate-card {
      grid-column: 1 / -1;
      background: rgba(79,142,247,0.06);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: var(--r); padding: 16px 20px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-slate-card:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.1); }
    .log-slate-card-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--chalk);
    }
    .log-slate-card-sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 3px; }

    .log-game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .log-game-card:hover { border-color: var(--border-bright); }
    .log-game-matchup {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem; font-weight: 800;
      color: var(--text); margin-bottom: 4px;
    }
    .log-game-meta { font-size: 0.68rem; color: var(--muted); }
    .log-has-data { color: var(--log-win); font-size: 0.65rem; font-weight: 700; margin-top: 4px; }

    /* Log drill-down */
    .log-drill-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .log-drill-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text);
    }
    .log-date-label {
      font-size: 0.7rem; color: var(--muted); margin-top: 2px;
    }

    /* Log prediction cards — shifted palette */
    .player-card.log-card::before { background: var(--tcolor, var(--log-chalk)); box-shadow: 2px 0 12px var(--tcolor, var(--log-chalk)); }
    .player-card.log-card .rank-badge { color: var(--tcolor, var(--log-chalk)); }
    .player-card.log-card .score-num { color: var(--log-score-color, var(--log-chalk)); }
    .player-card.log-card .slot-badge {
      color: var(--log-score-color, var(--log-chalk));
      background: rgba(123,164,200,0.08);
      border-color: rgba(123,164,200,0.2);
    }
    .player-card.log-card .mult-badge {
      background: rgba(123,164,200,0.08); color: var(--log-chalk);
      border-color: rgba(123,164,200,0.2);
    }

    /* Actual RS overlay on log cards */
    .actual-rs-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; padding: 2px 6px;
      border-radius: 4px;
    }
    .actual-rs-pill.hit { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .actual-rs-pill.miss { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }


    /* Result cards */
    .result-section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim);
      display: flex; align-items: center; gap: 8px; margin: 20px 0 12px;
    }
    .result-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
    }
    .result-badge.win { background: rgba(212,166,64,0.15); color: var(--log-win); border: 1px solid rgba(212,166,64,0.3); }
    .result-badge.opt { background: rgba(155,128,200,0.15); color: var(--log-opt); border: 1px solid rgba(155,128,200,0.3); }

    .winning-draft-card {
      background: var(--surface);
      border: 1px solid rgba(212,166,64,0.25);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .winning-draft-rank {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 800; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--log-win); margin-bottom: 8px;
    }
    .winning-draft-score {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 900; color: var(--log-win); float: right;
    }
    .winning-draft-player {
      font-size: 0.78rem; color: var(--text-dim); padding: 3px 0;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }
    .winning-draft-player:last-child { border-bottom: none; }
    .winning-draft-player b { color: var(--text); }

    /* ── LINE PAGE ── */
    .line-pick-card {
      background: var(--surface);
      border: 1px solid rgba(212,166,64,0.3);
      border-radius: var(--r); padding: 16px 18px;
      position: relative; overflow: hidden;
    }
    .line-pick-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--line); box-shadow: 2px 0 12px var(--line-glow);
    }
    .line-pick-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px;
    }
    .line-pick-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 900; letter-spacing: 0.02em; color: var(--text);
    }
    .line-pick-team { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
    .line-confidence-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900; color: var(--line);
      text-align: right; line-height: 1;
    }
    .line-confidence-sub { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .line-direction-row {
      display: flex; align-items: center; gap: 12px; margin: 14px 0 12px;
    }
    .line-direction-pill {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 6px;
    }
    .line-direction-pill.over  { background: rgba(212,166,64,0.15); color: var(--line); border: 1px solid rgba(212,166,64,0.35); }
    .line-direction-pill.under { background: rgba(20,184,166,0.12); color: var(--lab);  border: 1px solid rgba(20,184,166,0.3); }
    .line-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 900; color: var(--text); line-height: 1;
    }
    .line-stat-label { font-size: 0.7rem; color: var(--muted); }
    .line-proj { font-size: 0.75rem; color: var(--text-dim); }
    .line-narrative {
      font-size: 0.78rem; color: var(--text-dim); line-height: 1.5;
      border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px;
    }
    .line-signals {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .line-signal-chip {
      font-size: 0.62rem; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      background: rgba(212,166,64,0.1); color: var(--line); border: 1px solid rgba(212,166,64,0.2);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .line-runner-up {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      opacity: 0.8;
    }
    .line-runner-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .line-runner-main {
      display: flex; align-items: center; justify-content: space-between;
    }
    .line-runner-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 800; color: var(--text);
    }
    .line-runner-dir {
      font-size: 0.75rem; font-weight: 700; color: var(--muted);
    }
    .line-summary-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .line-summary-chip {
      font-size: 0.68rem; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
    }
    .line-history-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .line-history-row:last-child { border-bottom: none; }
    .line-history-name { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .line-history-sub  { font-size: 0.65rem; color: var(--muted); }
    .line-result-pill {
      font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .line-result-pill.hit     { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .line-result-pill.miss    { background: rgba(244,63,94,0.1); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
    .line-result-pill.pending { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
    .line-hist-tab {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px;
      border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
    }
    .line-hist-tab.active      { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .line-hist-tab.active.over { background: rgba(212,166,64,0.15); color: var(--line); border-color: rgba(212,166,64,0.4); }
    .line-hist-tab.active.under{ background: rgba(20,184,166,0.12); color: var(--lab);  border-color: rgba(20,184,166,0.3); }
    .line-hist-dir-pill {
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 1px 6px; border-radius: 3px; flex-shrink: 0;
    }
    .line-hist-dir-pill.over  { background: rgba(212,166,64,0.15); color: var(--line); border: 1px solid rgba(212,166,64,0.3); }
    .line-hist-dir-pill.under { background: rgba(20,184,166,0.12); color: var(--lab);  border: 1px solid rgba(20,184,166,0.25); }

    /* ── LAB / BEN PAGE ── */
    .lab-chat-header {
      display: flex; align-items: center; gap: 11px;
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .lab-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, rgba(20,184,166,0.25), rgba(20,184,166,0.1));
      border: 1px solid rgba(20,184,166,0.35);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; color: var(--lab);
    }
    .lab-chat-meta { display: flex; flex-direction: column; gap: 3px; }
    .lab-chat-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text); line-height: 1;
    }
    .lab-status {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.63rem; color: var(--lab); font-weight: 600; letter-spacing: 0.04em;
    }
    .lab-status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--lab); box-shadow: 0 0 6px var(--lab);
      animation: statusPulse 2.5s ease-in-out infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--lab); }
      50% { opacity: 0.55; box-shadow: 0 0 2px var(--lab); }
    }
    .lab-msg {
      padding: 10px 14px; max-width: 86%;
      font-size: 0.84rem; line-height: 1.58; animation: fadeUp 0.22s ease forwards;
    }
    .lab-msg.user {
      align-self: flex-end; max-width: 78%;
      background: linear-gradient(145deg, rgba(20,184,166,0.22) 0%, rgba(14,130,120,0.14) 100%);
      border: 1px solid rgba(20,184,166,0.28);
      border-radius: 16px 16px 4px 16px;
      color: var(--text);
    }
    .lab-msg.assistant {
      align-self: flex-start;
      background: rgba(10,16,26,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 1px solid rgba(20,184,166,0.2);
      border-radius: 4px 16px 16px 16px;
      color: var(--text);
    }
    .lab-msg.assistant .lab-msg-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--lab);
      margin-bottom: 7px; display: block;
    }
    .lab-msg.thinking {
      align-self: flex-start;
      background: rgba(10,16,26,0.85);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 4px 16px 16px 16px;
    }
    .lab-thinking-dots { display: flex; gap: 5px; align-items: center; padding: 3px 2px; }
    .lab-thinking-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--lab);
      animation: labPulse 1.3s ease-in-out infinite;
    }
    .lab-thinking-dots span:nth-child(2) { animation-delay: 0.22s; }
    .lab-thinking-dots span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes labPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.75); }
      40% { opacity: 1; transform: scale(1.1); }
    }
    .lab-config-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
    }
    .lab-config-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--lab); margin-bottom: 8px;
    }
    .lab-changelog-item {
      font-size: 0.72rem; color: var(--text-dim); padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .lab-changelog-item:last-child { border-bottom: none; }
    .lab-changelog-ver {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; color: var(--lab); margin-right: 6px;
    }
    #labInput { line-height: 1.4; font-size: 16px; }
    #labInput:focus { border-color: var(--lab); }
    /* Ben tab: fixed-height flex column — messages scroll, input always visible */
    #tab-lab.active {
      display: flex; flex-direction: column;
      /* Subtract header (~80px) + bottom nav clearance (~120px: nav height 104px + 16px margin) */
      height: calc(100dvh - 80px - 120px);
      padding-top: 0; overflow: hidden;
    }
    /* When keyboard opens (labInput focused): nav hidden, expand to fill the freed space */
    #tab-lab.active.lab-kb-open {
      height: calc(100dvh - 80px);
    }
    #labUnlocked {
      display: flex; flex-direction: column;
      flex: 1; padding-top: 20px; overflow: hidden;
      min-height: 0;
    }
    #labMessages {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      /* flex column so ::before spacer can push messages to bottom */
      display: flex; flex-direction: column;
    }
    /* Spacer: grows when few messages, pushes them to the bottom like a real chat UI */
    #labMessages::before { content: ''; flex: 1; }
    #labInputWrap { flex-shrink: 0; padding: 10px 0 max(8px, env(safe-area-inset-bottom, 8px)); }
    .lab-send-btn {
      width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
      background: var(--lab); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.18s;
      box-shadow: 0 2px 10px rgba(20,184,166,0.3);
    }
    .lab-send-btn:hover:not(:disabled) { filter: brightness(1.12); transform: scale(1.05); }
    .lab-send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── MAGIC 8-BALL LOADER ── */
    #oracleLoader {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(6,10,15,0.94);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #oracleLoader.visible { opacity: 1; pointer-events: all; }

    .magic8-ball {
      width: 130px; height: 130px; border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #1e2235 0%, #090c14 60%, #030508 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 8px 40px rgba(0,0,0,0.8),
        0 0 60px rgba(79,142,247,0.08),
        inset 4px 4px 14px rgba(255,255,255,0.055),
        inset -4px -4px 14px rgba(0,0,0,0.6);
      position: relative;
      animation: ballFloat 3.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Shine highlight */
    .magic8-ball::before {
      content: '';
      position: absolute; top: 14px; left: 22px;
      width: 28px; height: 16px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.18) 0%, transparent 70%);
      border-radius: 50%; transform: rotate(-30deg);
    }

    /* The 8 circle */
    .magic8-num {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -62%);
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 900; color: rgba(255,255,255,0.7);
      letter-spacing: 0;
    }

    /* Triangle window at bottom */
    .magic8-window {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      width: 70px; height: 60px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .magic8-window::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 80%, #0a1628 0%, #060a10 100%);
      clip-path: polygon(50% 2%, 100% 100%, 0% 100%);
      border: 1px solid rgba(79,142,247,0.25);
    }
    .magic8-text {
      position: relative; z-index: 1;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.5rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--chalk);
      text-align: center; line-height: 1.2;
      padding-top: 20px; width: 56px;
      animation: textFadeIn 0.4s ease forwards;
    }

    .oracle-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      animation: textPulse 2s ease-in-out infinite;
    }

    @keyframes ballFloat {
      0%, 100% { transform: translateY(0px) rotate(-1.5deg); }
      50%       { transform: translateY(-16px) rotate(1.5deg); }
    }
    @keyframes textFadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; }
    }
  </style>
</head>
<body>

<!-- ══ MAGIC 8-BALL ORACLE LOADER ══ -->
<div id="oracleLoader">
  <div class="magic8-ball">
    <div class="magic8-num">8</div>
    <div class="magic8-window">
      <div class="magic8-text" id="oracleMsg">READING THE GAME</div>
    </div>
  </div>
  <div class="oracle-label">The Oracle is thinking...</div>
</div>

<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🏀</div>
      <div>
        THE ORACLE
        <span class="logo-sub">Sees what others miss</span>
      </div>
    </div>
  </header>

  <!-- Contextual sub-nav: floats independently above the bottom tab bar -->
  <div class="predict-sub-nav" id="predictSubNav">
    <button class="predict-sub-btn active" data-sub="slate" onclick="switchPredictSub('slate')">Slate-Wide</button>
    <button class="predict-sub-btn" data-sub="game" onclick="switchPredictSub('game')">Game</button>
  </div>
  <!-- Line sub-nav: same pill, Over / Under direction filter -->
  <div class="predict-sub-nav" id="lineSubNav" style="display:none">
    <button class="predict-sub-btn line-dir-btn" data-dir="over" onclick="switchLineDir('over')">Over</button>
    <button class="predict-sub-btn line-dir-btn active" data-dir="under" onclick="switchLineDir('under')">Under</button>
  </div>

  <!-- ══ BOTTOM TAB NAVIGATION — Dribbble floating card ══ -->
  <nav class="bottom-nav" id="bottomNav">
    <!-- Primary icon row -->
    <div class="bnav-icon-row">
      <button class="bnav-icon-btn active" data-tab="predictions" onclick="switchTab('predictions')">
        <div class="bnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <span class="bnav-label">Predict</span>
      </button>
      <button class="bnav-icon-btn" data-tab="line" onclick="switchTab('line')">
        <div class="bnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
        <span class="bnav-label">Line</span>

// ════════════════════════════════════════════════════════════════════
// MAGIC 8-BALL LOADER — grep: showLoader, hideLoader, oracleLoader, oracleMsg
// Shown during loadSlate() and runAnalysis() API calls
// ════════════════════════════════════════════════════════════════════
const ORACLE_MSGS = [
  'READING THE GAME',
  'CONSULTING THE ORACLE',
  'CALCULATING EDGE',
  'SEEKING THE LINE',
  'ANALYZING THE SLATE',
  'SENSING THE FIELD',
  'FOLLOWING THE MONEY',
];
let _oracleMsgIdx = 0;
let _oracleMsgTimer = null;

function showLoader() {
  const el = document.getElementById('oracleLoader');
  const msg = document.getElementById('oracleMsg');
  if (!el) return;
  // Rotate messages every 1.8s while visible
  _oracleMsgIdx = Math.floor(Math.random() * ORACLE_MSGS.length);
  if (msg) msg.textContent = ORACLE_MSGS[_oracleMsgIdx];
  _oracleMsgTimer = setInterval(() => {
    _oracleMsgIdx = (_oracleMsgIdx + 1) % ORACLE_MSGS.length;
    if (msg) {
      msg.style.animation = 'none';
      msg.offsetHeight; // reflow to restart animation
      msg.style.animation = '';
      msg.textContent = ORACLE_MSGS[_oracleMsgIdx];
    }
  }, 1800);
  el.classList.add('visible');
}

function hideLoader() {
  clearInterval(_oracleMsgTimer);
  const el = document.getElementById('oracleLoader');
  if (el) el.classList.remove('visible');
}

// GAME SELECTOR — grep: initGameSelector, gameSel, game dropdown, /api/games
// ════════════════════════════════════════════════════════════════════
async function initGameSelector() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  try {
    const r = await fetch('/api/games');
    const games = await r.json();
    if (!games.length) {
      sel.innerHTML = '<option value="">No games today</option>';
      return;
    }
    sel.innerHTML = '<option value="">Select a game...</option>';
    games.forEach(g => {
      const o = document.createElement('option');
      o.value = g.gameId;
      let label = g.label + (g.total ? ` \u00B7 O/U ${g.total}` : '');
      if (g.startTime) {
        const start = new Date(g.startTime);
        label += ` \u00B7 ${start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
      }
      if (g.locked) label += ' \uD83D\uDD12';
      o.textContent = label;
      sel.appendChild(o);
    });
    sel.onchange = () => { btn.disabled = !sel.value; };
  } catch(e) {
    sel.innerHTML = '<option value="">Offline — check backend</option>';
  }
}

// ════════════════════════════════════════════════════════════════════
// SLATE — grep: loadSlate, /api/slate, slateList, Starting 5, Moonshot
// ════════════════════════════════════════════════════════════════════
async function loadSlate() {
  showLoader();
  renderSkeletons('slateList', 5);
  try {
    const r = await fetch('/api/slate');
    hideLoader();
    if (!r.ok) throw new Error('Slate fetch failed');
    const slateData = await r.json();
    const isEmptyLocked = slateData.locked && !slateData.lineups.chalk.length;
    if (isEmptyLocked) {
      // Cold-start after lock: server has no cache. Try in-memory SLATE first, then localStorage.
      const lsKey = `slate_${slateData.date || ''}`;
      const todayET = _etToday();
      let restored = SLATE;
      // Discard in-memory SLATE if it's from a different ET date
      if (restored && restored.date && restored.date !== todayET) restored = null;
      if (!restored || !restored.lineups?.chalk?.length) {
        try {
          const raw = localStorage.getItem(lsKey);
          if (raw) {
            const parsed = JSON.parse(raw);
            // Only restore if the stored slate is for today (ET date)
            restored = (parsed?.date === todayET) ? parsed : null;
          }
        } catch(e) {}
      }
      if (restored && restored.lineups?.chalk?.length) {
        SLATE = { ...restored, locked: true, all_complete: slateData.all_complete || false };
      } else {
        SLATE = slateData;
      }
    } else {
      SLATE = slateData;
      // Persist valid slate to localStorage for cold-start recovery after lock.
      if (slateData.lineups?.chalk?.length || slateData.lineups?.upside?.length) {
        try {
          const lsKey = `slate_${slateData.date || ''}`;
          localStorage.setItem(lsKey, JSON.stringify(slateData));
        } catch(e) {}
      }
    }
    document.getElementById('slateTabs').style.display = 'flex';

    // If slate not yet locked, schedule an auto-re-fetch when the lock window opens
    // so the "Picks Locked" chip appears without the user having to manually refresh.
    if (!SLATE.locked) {
      const now = Date.now();
      const startMs = (SLATE.games || [])
        .map(g => g.startTime ? new Date(g.startTime).getTime() : Infinity)
        .filter(t => isFinite(t));
      if (startMs.length) {
        const lockAt = Math.min(...startMs) - 5 * 60 * 1000; // 5 min before first tipoff
        const delay = lockAt - now;
        if (delay > 0 && delay < 4 * 60 * 60 * 1000) { // only arm if ≤ 4 hours out
          setTimeout(() => { if (!SLATE.locked) loadSlate(); }, delay + 2000);
        }
      }
    }

    const chips = document.getElementById('slateChips');
    const slateDate = SLATE.date ? new Date(SLATE.date + 'T12:00:00') : new Date();
    const dateStr = slateDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();

    // Authoritative lock: server flag OR client-side check (catches case where API was
    // called just before the 5-min window and the page wasn't refreshed).
    const _lockNow = Date.now();
    const clientLocked = (SLATE.games || []).some(g =>
      g.startTime && (new Date(g.startTime).getTime() - _lockNow) < 5 * 60 * 1000
    );
    const isLocked = SLATE.locked || SLATE.all_complete || clientLocked;

    let lockChip = '';
    if (isLocked) {
      lockChip = '<div class="lock-chip">Picks Locked</div>';
    }
    // draftable_count is always present now; fall back to games.length only for legacy cache.
    const draftable = SLATE.draftable_count != null ? SLATE.draftable_count : (SLATE.games || []).length;
    const totalGames = (SLATE.games || []).length;
    // Show total game count (X Games) when locked/complete so user knows the slate size.
    // Show draftable count when slate is open so user knows how many are still pickable.
    const gameCount = isLocked ? totalGames : draftable;
    chips.innerHTML = `
      <div class="chip"><b>${gameCount}</b> Game${gameCount !== 1 ? 's' : ''}</div>
      <div class="chip">${dateStr}</div>
      ${lockChip}
    `;
    switchSlate('chalk');
    savePredictions();
  } catch(e) {
    hideLoader();
    document.getElementById('slateList').innerHTML = `
      <div class="empty-state">
        <span class="icon">📡</span>
        <p>Couldn't load today's slate.<br>Make sure the API server is running.</p>
      </div>`;
  }
}

// PER-GAME ANALYSIS — grep: runAnalysis, /api/picks, analyzeBtn, game analysis
// ════════════════════════════════════════════════════════════════════
async function runAnalysis() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  const banner = document.getElementById('errorBanner');
  const gameId = sel.value;
  if (!gameId) return;

  banner.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  renderSkeletons('picksList', 5);
  showLoader();

  try {
    const r = await fetch(`/api/picks?gameId=${gameId}`);
    hideLoader();
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Server error' }));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const picksData = await r.json();
    if (picksData.locked && !picksData.lineups.chalk.length && PICKS_DATA) {
      PICKS_DATA.locked = true;
    } else {
      PICKS_DATA = picksData;
    }
    document.getElementById('picksTabsWrap').style.display = 'flex';
    document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.t === 'chalk'));

    const badge = document.getElementById('gameScriptBadge');
    if (PICKS_DATA.gameScript) {
      const total = PICKS_DATA.game?.total;
      badge.innerHTML = `Game Script: <b>${PICKS_DATA.gameScript}</b>${total ? ` (O/U ${total})` : ''}`;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }

    const lockBadge = document.getElementById('gameLockBadge');
    if (PICKS_DATA.locked) {
      lockBadge.innerHTML = 'Picks locked — showing final predictions';
      lockBadge.style.display = 'block';
      lockBadge.style.color = '#22c55e';
    } else {
      lockBadge.style.display = 'none';
    }

    const injBadge = document.getElementById('gameInjuryBadge');
    const injuries = PICKS_DATA.injuries || [];
    if (injuries.length > 0) {
      const names = injuries.map(inj => `${inj.name} (${inj.team})`).join(', ');
      injBadge.innerHTML = `<b>${injuries.length} OUT</b>: ${names}`;
      injBadge.style.display = 'block';
    } else {
      injBadge.style.display = 'none';
    }

    renderCards(PICKS_DATA.lineups.chalk, 'picksList', 'chalk');
    savePredictions();
  } catch(e) {
    hideLoader();
    document.getElementById('picksList').innerHTML = '';
    banner.textContent = `⚠ ${e.message}`;
    banner.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Draft';
  }
}

// ════════════════════════════════════════════════════════════════════
// CARD RENDERING — grep: renderCards, player-card, TEAM_COLORS, tcolor, rank-badge
// ════════════════════════════════════════════════════════════════════
function renderCards(picks, containerId, mode, opts = {}) {
  const el = document.getElementById(containerId);
  if (!picks || !picks.length) {
    const msg = SLATE?.no_games_yet
      ? `Today's slate will be available around <b>${SLATE.available_after}</b>.`
      : 'No players to display yet.';
    el.innerHTML = `<div class="empty-state"><span class="icon">🏀</span><p>${msg}</p></div>`;
    return;
  }

  const isUpside = mode === 'upside';
  const isLog = opts.log || false;
  const scoreColor = isLog
    ? (isUpside ? 'var(--log-upside)' : 'var(--log-chalk)')
    : (isUpside ? 'var(--upside)' : 'var(--chalk)');
  const actualsMap = opts.actualsMap || {};

  el.innerHTML = picks.map((p, i) => {
    const tc = TEAM_COLORS[p.team] || (isLog ? '#7ba4c8' : '#4f8ef7');
    const tcAlpha = (() => {
      const hex = tc.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      return `rgba(${r},${g},${b},0.06)`;
    })();

    const multBadge = p.est_mult ? `<span class="mult-badge">+${p.est_mult}x card</span>` : '';

    // Actual RS pill for log cards
    let actualPill = '';
    if (isLog) {
      const act = actualsMap[p.name];
      if (act !== undefined) {
        const pred = parseFloat(p.rating) || 0;
        const cls = act >= pred * 0.85 ? 'hit' : 'miss';
        actualPill = `<span class="actual-rs-pill ${cls}">RS ${act}</span>`;
      }
    }

    const statsHtml = [
      multBadge,
      actualPill,
      p.predMin && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.predMin}</b> min</div>`,
      p.pts      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.pts}</b> pts</div>`,
      p.reb      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.reb}</b> reb</div>`,
      p.ast      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.ast}</b> ast</div>`,
      p.stl      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.stl}</b> stl</div>`,
      p.blk      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.blk}</b> blk</div>`,
      (p._decline && p._decline < 0.85) && `<div class="stat-pill" style="color:#f43f5e"><b>↓${Math.round((1-p._decline)*100)}%</b> usage</div>`,
    ].filter(Boolean).join('');

    const logCardClass = isLog ? ' log-card' : '';
    const logScoreColorVar = isLog ? `--log-score-color:${scoreColor};` : '';

    return `
      <div class="player-card${logCardClass}" style="--tcolor:${tc};--tcolor-alpha:${tcAlpha};${logScoreColorVar}${!isLog ? `--score-color:${scoreColor};` : ''}animation-delay:${i*0.06}s">
        <div class="rank-badge">${p.slot || (i+1)}</div>
        <div class="player-info">
          <div class="player-meta">
            ${p.team || '—'} <span class="pos-pill">${p.pos || '—'}</span>${p.injury_status ? ` <span class="injury-badge">${p.injury_status}</span>` : ''}
          </div>
          <div class="player-name">${p.name}</div>
          <div class="stat-pills">${statsHtml}</div>
        </div>
        <div class="score-col" style="--score-color:${scoreColor};">
          <div class="score-num">${p.rating}</div>
          <span class="score-label">RS</span>
          ${p.chalk_ev ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:700;color:var(--muted);margin-top:2px">${p.chalk_ev} EV</div>` : ''}
          <div class="slot-badge" style="background:${isUpside?(isLog?'rgba(184,152,120,0.08)':'rgba(249,115,22,0.1)'):(isLog?'rgba(123,164,200,0.08)':'rgba(79,142,247,0.1)')};border-color:${isUpside?(isLog?'rgba(184,152,120,0.2)':'rgba(249,115,22,0.25)'):(isLog?'rgba(123,164,200,0.2)':'rgba(79,142,247,0.25)')}">
            ${p.slot || '—'}
          </div>
        </div>
      </div>`;
  }).join('');
}

// PREDICTION PERSISTENCE — grep: savePredictions, /api/save-predictions, GitHub CSV
// ════════════════════════════════════════════════════════════════════
let _predSavedDate = '';
function _etToday() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}
async function savePredictions() {
  const today = _etToday();
  if (_predSavedDate === today) return; // only fire once per ET day
  // Only save when the slate is locked — predictions are finalized at that point.
  // If called pre-lock, skip without consuming the flag so it can fire on next call.
  if (!SLATE || !SLATE.locked) return;
  _predSavedDate = today;
  try {
    await fetch('/api/save-predictions', { method: 'POST' });
  } catch(e) {
    _predSavedDate = ''; // allow retry on network error
    console.warn('Prediction save failed:', e);
  }
}

async function initLogPage() {
  // Build date strip for last 30 days
  const today = new Date();
  const strip = document.getElementById('logDateStrip');
  strip.innerHTML = '';

  // Load dates with data
  try {
    const r = await fetch('/api/log/dates');
    if (r.ok) {
      const dates = await r.json();
      dates.forEach(d => LOG.datesWithData.add(d));

    }
  } catch(e) { /* non-fatal */ }

  // Build chips: today + 29 prior days
  // Use local date to avoid UTC midnight shift (e.g. 7pm ET = midnight UTC = wrong day)
  const toLocalISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const chips = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const iso = toLocalISO(d);
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase().slice(0, 3);
    const numLabel = d.getDate();
    const hasData = LOG.datesWithData.has(iso);
    chips.push({ iso, dayLabel, numLabel, hasData, isToday: i === 0 });
  }

  strip.innerHTML = chips.map(c => `
    <button class="date-chip${c.isToday ? ' active' : ''}" data-date="${c.iso}" onclick="selectLogDate('${c.iso}')">
      <span class="date-chip-day">${c.dayLabel}</span>
      <span class="date-chip-num">${c.numLabel}</span>
      <span class="date-chip-dot${c.hasData ? '' : ' hidden-dot'}"></span>
    </button>`).join('');

  // Auto-select today
  const todayIso = toLocalISO(today);
  selectLogDate(todayIso);
}

async function selectLogDate(dateStr) {
  // Update strip selection
  document.querySelectorAll('.date-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.date === dateStr));

  LOG.selectedDate = dateStr;
  LOG.data = null;
  closeLogDrilldown();

  // Load data
  const grid = document.getElementById('logGameGrid');
  grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">⏳</span><p>Loading...</p></div>`;

  try {
    const r = await fetch(`/api/log/get?date=${dateStr}`);
    if (!r.ok) throw new Error('Failed to load log data');
    LOG.data = await r.json();
  } catch(e) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📡</span><p>Couldn't load data for this date.</p></div>`;
    return;
  }

  renderLogGrid(dateStr);
}

function renderLogGrid(dateStr) {
  const data = LOG.data;
  const grid = document.getElementById('logGameGrid');
  const label = document.getElementById('logGridLabel');

  const d = new Date(dateStr + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
  label.textContent = dateLabel;

  if (!data || !data.has_predictions) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📭</span><p>No predictions saved for this date.</p></div>`;
    return;
  }

  // Build game list from scopes
  const scopes = data.scopes || {};
  const gameScopes = Object.keys(scopes).filter(s => s !== 'slate');
  const hasSlate = 'slate' in scopes;
  const hasActuals = data.has_actuals;
  const isToday = dateStr === _etToday();

  let html = '';

  // Full Slate card — only show once all games are done (actuals exist).
  // While today's games are still in progress, show a placeholder instead.
  if (hasSlate) {
    if (isToday && !hasActuals) {
      html += `
        <div class="log-slate-card" style="opacity:0.55;cursor:default">
          <div>
            <div class="log-slate-card-label">Full Slate</div>
            <div class="log-slate-card-sub">Games in progress — results after final</div>
          </div>
          <span style="color:var(--muted);font-size:1.2rem">⏳</span>
        </div>`;
    } else {
      const playerCount = (scopes['slate']?.chalk?.length || 0) + (scopes['slate']?.upside?.length || 0);
      html += `
        <div class="log-slate-card" onclick="openLogDrilldown('slate', 'Full Slate')">
          <div>
            <div class="log-slate-card-label">Full Slate</div>
            <div class="log-slate-card-sub">${playerCount} players${hasActuals ? ' · Results available' : ''}</div>
          </div>
          <span style="color:var(--chalk);font-size:1.2rem">›</span>
        </div>`;
    }
  }

  // Per-game cards — scope is now the readable label (e.g. "BOS @ NYK")
  gameScopes.forEach(scope => {
    const chalkCount = scopes[scope]?.chalk?.length || 0;
    const escapedScope = scope.replace(/'/g, "\\'");
    html += `
      <div class="log-game-card" onclick="openLogDrilldown('${escapedScope}', '${escapedScope}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="log-game-matchup">${scope}</div>
          <span style="color:var(--muted);font-size:1rem;margin-left:6px">›</span>
        </div>
        <div class="log-game-meta">${chalkCount} players${hasActuals ? ' · Results' : ''}</div>
      </div>`;
  });

  if (!html) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="icon">📭</span><p>No data for this date.</p></div>`;
    return;
  }

  grid.innerHTML = html;
}

function openLogDrilldown(scope, gameLabel) {
  LOG.scope = scope;
  LOG.gameLabel = gameLabel;
  LOG.currentTab = 'chalk';

  document.getElementById('logGridView').style.display = 'none';
  document.getElementById('logDrillView').style.display = 'block';
  window.scrollTo({top: 0, behavior: 'smooth'});

  const d = new Date((LOG.selectedDate || '') + 'T12:00:00');
  const dateLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();

  document.getElementById('logDrillTitle').textContent = gameLabel || scope;
  document.getElementById('logDrillDate').textContent = dateLabel;

  renderLogDrillCards();
}

function closeLogDrilldown() {
  document.getElementById('logGridView').style.display = 'block';
  document.getElementById('logDrillView').style.display = 'none';
}

function switchLogTab(tab) {
  LOG.currentTab = tab;
  document.querySelectorAll('#logDrillTabs .mode-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.t === tab));
  renderLogDrillCards();
}

function renderLogDrillCards() {
  const data = LOG.data;
  const scope = LOG.scope;
  const tab = LOG.currentTab;

  if (!data || !data.scopes || !data.scopes[scope]) {
    document.getElementById('logPredCards').innerHTML = `<div class="empty-state"><span class="icon">📭</span><p>No predictions saved for this scope.</p></div>`;
    return;
  }

  const players = data.scopes[scope][tab] || [];

  // Build actuals map: player_name → actual_rs
  const actualsMap = {};
  if (data.actuals) {
    data.actuals.forEach(a => {
      if (a.player_name && a.actual_rs) {
        actualsMap[a.player_name] = parseFloat(a.actual_rs);
      }
    });
  }

  // Normalize player objects from CSV format (include stat pills if stored)
  const normalized = players.map((p, i) => ({
    name: p.name || p.player_name || '',
    team: p.team || '',
    pos: p.pos || '',
    rating: parseFloat(p.rating || p.predicted_rs || 0).toFixed(1),
    est_mult: p.est_mult || p.est_card_boost || '',
    predMin: p.predMin || p.pred_min || '',
    pts:  p.pts  ? parseFloat(p.pts).toFixed(1)  : '',
    reb:  p.reb  ? parseFloat(p.reb).toFixed(1)  : '',
    ast:  p.ast  ? parseFloat(p.ast).toFixed(1)  : '',
    stl:  p.stl  ? parseFloat(p.stl).toFixed(1)  : '',
    blk:  p.blk  ? parseFloat(p.blk).toFixed(1)  : '',
    slot: p.slot || `${i+1}`,
  }));

  renderCards(normalized, 'logPredCards', tab, { log: true, actualsMap });
}

function _benTriggerUpload(type) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => _handleBenUpload(input.files[0], type);
  input.click();
}

async function _handleBenUpload(file, type) {
  if (!file) return;
  const btnId = type === 'real_scores' ? 'benUploadRSBtn' : 'benUploadWinBtn';
  const btn = document.getElementById(btnId);
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading...'; }

  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/parse-screenshot', { method: 'POST', body: form });
    const data = await r.json();
    if (!r.ok || !data.players?.length) throw new Error(data.error || 'No players found');

    if (type === 'real_scores') {
      const today = _etToday();
      await fetch('/api/save-actuals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: today, players: data.players }),
      });
      if (btn) { btn.textContent = '✓ Real Scores'; btn.style.background = 'rgba(34,197,94,0.2)'; btn.style.border = '1px solid var(--green)'; btn.style.color = 'var(--green)'; }

      // Compute hindsight
      const hindsightPlayers = data.players
        .filter(p => p.actual_rs != null && p.actual_rs > 0)
        .map(p => ({ name: p.player_name || p.name || '', actual_rs: p.actual_rs, actual_card_boost: p.actual_card_boost || 0.3 }));
      let hindsightStr = '';
      if (hindsightPlayers.length >= 5) {
        try {
          const hr = await fetch('/api/hindsight', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ players: hindsightPlayers }),
          });
          if (hr.ok) {
            const hd = await hr.json();
            if (hd.lineup?.length) {
              hindsightStr = ' Hindsight optimal lineup: ' + hd.lineup.map((p,i) => `${i+1}. ${p.name} (${p.rating} RS)`).join(', ') + '.';
            }
          }
        } catch(e) {}
      }

      const summary = `Real Scores uploaded for ${today}. Players: ${data.players.map(p => `${p.player_name||p.name}: ${p.actual_rs} RS`).join(', ')}.${hindsightStr}`;
      appendLabMessage('user', summary, true);
      await labCallClaude();

    } else {
      // Persist leaderboard data to GitHub so Ben can reference it in future sessions
      const today = _etToday();
      const leaderboardPlayers = data.players.filter(p => p.player_name || p.name).map(p => ({
        ...p,
        player_name: p.player_name || p.name || '',
        source: 'leaderboard',
      }));
      if (leaderboardPlayers.length) {
        try {
          await fetch('/api/save-actuals', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: today, players: leaderboardPlayers }),
          });
        } catch(e) { /* persist failure is non-fatal */ }
      }
      if (btn) { btn.textContent = '✓ Top Drafts'; btn.style.background = 'rgba(34,197,94,0.2)'; btn.style.border = '1px solid var(--green)'; btn.style.color = 'var(--green)'; }
      const summary = `Top Drafts uploaded for ${today}. Winners: ${data.players.slice(0,6).map(p => `${p.player_name||p.name}${p.total_value ? ` (${p.total_value})` : ''}`).join(', ')}.`;
      appendLabMessage('user', summary, true);
      await labCallClaude();
    }

  } catch(e) {
    appendLabMessage('assistant', `Upload failed: ${e.message}. Try again.`);
    if (btn) { btn.disabled = false; btn.textContent = origText; }
  }
}

let LINE_LOADED_DATE = '';
let LINE_DIR = 'under'; // active direction filter for line sub-nav
let LINE_OVER_PICK  = null; // today's over pick
let LINE_UNDER_PICK = null; // today's under pick
let LINE_RESOLVE_POLL = null; // setInterval id for pending pick polling

async function _tryAutoResolveLine(pick) {
  if (LINE_RESOLVE_POLL) { clearInterval(LINE_RESOLVE_POLL); LINE_RESOLVE_POLL = null; }
  try {
    const ar = await fetch('/api/auto-resolve-line');
    if (!ar.ok) return;
    const arData = await ar.json();
    if (arData.status === 'resolved' || arData.status === 'already_resolved') {
      const resolvedPick = { ...pick, result: arData.result, actual_stat: arData.actual_stat };
      document.getElementById('linePickCard').innerHTML = renderLinePickCard(resolvedPick, true);
      // Refresh history row too
      const hr2 = await fetch('/api/line-history');
      if (hr2.ok) {
        const hist2 = await hr2.json();
        if (hist2.picks && hist2.picks.length) {
          document.getElementById('lineHistoryWrap').style.display = 'block';
          LINE_LOADED_DATE = ''; renderLineHistory(hist2); LINE_LOADED_DATE = _etToday();
        }
      }
    } else if (arData.status === 'game_not_final') {
      // Game still live — poll every 5 min until it finishes
      LINE_RESOLVE_POLL = setInterval(async function() {
        if (document.getElementById('linePickWrap').style.display === 'none') {
          clearInterval(LINE_RESOLVE_POLL); LINE_RESOLVE_POLL = null; return;
        }
        await _tryAutoResolveLine(pick);
      }, 5 * 60 * 1000);
    }
  } catch(e) { /* non-fatal */ }
}

async function initLinePage() {
  const todayET = _etToday();
  if (LINE_LOADED_DATE === todayET) return;
  LINE_LOADED_DATE = todayET;
  document.getElementById('lineLoading').style.display = 'block';
  document.getElementById('lineEmpty').style.display = 'none';
  document.getElementById('linePickWrap').style.display = 'none';
  document.getElementById('lineHistoryWrap').style.display = 'none';
  // Reset content
  document.getElementById('linePickCard').innerHTML = '';
  document.getElementById('lineSlateSummary').innerHTML = '';

  try {
    const r = await fetch('/api/line-of-the-day');
    const data = await r.json();
    document.getElementById('lineLoading').style.display = 'none';

    // Show resolved-today banner when we've rotated to tomorrow's pick
    const resolvedToday = data.resolved_today;
    const resolvedTodayEl = document.getElementById('lineResolvedToday');
    // Suppress the resolved banner if the rotation picked the same player again —
    // showing both cards simultaneously creates the confusing "Over AND Under" duplicate.
    const samePlayerRotation = resolvedToday && data.pick &&
      (resolvedToday.player_name || '').toLowerCase() === (data.pick.player_name || '').toLowerCase();
    if (resolvedToday && resolvedToday.result && resolvedToday.result !== 'pending' && !samePlayerRotation) {
      resolvedTodayEl.style.display = 'block';
      resolvedTodayEl.innerHTML = renderResolvedTodayBanner(resolvedToday);
    } else {
      resolvedTodayEl.style.display = 'none';
    }

    if (!data.pick) {
      // Special case: today resolved, tomorrow's slate not posted yet
      if (data.error === 'next_slate_pending') {
        document.getElementById('linePickWrap').style.display = 'block';
        document.getElementById('linePickCard').innerHTML = renderNextSlatePending();
        return;
      }
      const msgs = {
        no_api_key:       'Odds API key not configured — contact admin.',
        no_games:         'No NBA games on the slate today.',
        no_edges:         "No strong edges found on today's props. Check back closer to tip-off.",
        odds_unavailable: 'Odds API unavailable. Try refreshing.',
        no_projections:   'Could not load player projections.',
      };
      const icons = {
        no_games:  '🏀',
        no_edges:  '📊',
        no_api_key:'🔑',
        default:   '📡',
      };
      const emptyEl = document.getElementById('lineEmpty');
      emptyEl.querySelector('.icon').textContent = icons[data.error] || icons.default;
      document.getElementById('lineEmptyMsg').textContent = msgs[data.error] || 'No line pick available.';
      emptyEl.style.display = 'flex';
      return;
    }

    // Store both direction picks
    LINE_OVER_PICK  = data.over_pick  || (data.pick && data.pick.direction === 'over'  ? data.pick : null);
    LINE_UNDER_PICK = data.under_pick || (data.pick && data.pick.direction === 'under' ? data.pick : null);

    document.getElementById('linePickWrap').style.display = 'block';
    if (data.slate_summary) {
      document.getElementById('lineSlateSummary').innerHTML = renderLineSummary(data.slate_summary);
    }
    // Render whichever pick matches the active direction (default: under)
    switchLineDir(LINE_DIR);

    // Auto-save both picks
    try {
      await fetch('/api/save-line', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pick: data.pick, over_pick: data.over_pick, under_pick: data.under_pick }),
      });
    } catch(e) { /* non-fatal */ }

    // Auto-resolve: try to resolve primary pick against completed ESPN boxscores.
    const primaryPick = data.pick;
    const pickResult = primaryPick && primaryPick.result;
    if (primaryPick && (!pickResult || pickResult === 'pending')) {
      await _tryAutoResolveLine(primaryPick);
    }

  } catch(e) {
    document.getElementById('lineLoading').style.display = 'none';
    const emptyEl = document.getElementById('lineEmpty');
    emptyEl.querySelector('.icon').textContent = '📡';
    document.getElementById('lineEmptyMsg').textContent = 'Couldn\'t load line pick. Check backend.';
    emptyEl.style.display = 'flex';
  }

  // Load history
  try {
    const hr = await fetch('/api/line-history');
    if (hr.ok) {
      const hist = await hr.json();
      if (hist.picks && hist.picks.length) {
        document.getElementById('lineHistoryWrap').style.display = 'block';
        renderLineHistory(hist);
        // Sync history to whatever direction is active in the sub-nav
        filterLineHistory(LINE_DIR);
      }
    }
  } catch(e) { /* non-fatal */ }
}

    <div class="line-pick-card">

        <div>
          <div class="line-pick-name">${pick.player_name}</div>
          <div class="line-pick-team">${pick.team} · vs ${pick.opponent}</div>
        </div>
        <div style="text-align:right">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">

let LINE_HIST_DATA = null;

function renderLineHistory(hist) {
  LINE_HIST_DATA = hist;
  const streak = hist.streak ? `${hist.streak}× ${hist.streak_type}` : '';

  let statsHtml = '';
  if (hist.hit_rate !== null || streak) {
    const hitRate = hist.hit_rate !== null ? `${hist.hit_rate}%` : '—';
    statsHtml = `
    <div style="display:flex;gap:16px;margin-bottom:14px">
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;color:var(--line)">${hitRate}</div>
        <div style="font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Hit Rate</div>
      </div>
      ${streak ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:900;color:${hist.streak_type==='hit'?'var(--green)':'var(--red)'}">${streak}</div>
        <div style="font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">Streak</div>
      </div>` : ''}
    </div>`;
  }

  document.getElementById('lineHistoryStats').innerHTML = statsHtml;
  document.getElementById('lineHistoryList').innerHTML = renderLineHistoryRows(hist.picks, 'all');
}

function renderLineHistoryRows(picks, dirFilter) {
  let html = '';
  const filtered = dirFilter === 'all' ? picks : picks.filter(p => (p.direction || 'over') === dirFilter);
  const _picks = [];
  filtered.slice(0, 10).forEach(p => {
    const result = p.result || 'pending';
    const dir    = p.direction || 'over';
    const idx    = _picks.push(p) - 1;
    html += `
      <div class="line-history-row" style="cursor:pointer" data-pick-idx="${idx}" onclick="openLinePickModalByIdx(this)">
        <div style="display:flex;align-items:center;gap:7px;min-width:0">
          <span class="line-hist-dir-pill ${dir}">${dir.toUpperCase()}</span>
          <div style="min-width:0">
            <div class="line-history-name">${p.player_name}</div>
            <div class="line-history-sub">${p.line} ${p.stat_type||'pts'} · ${p.date}</div>
          </div>
        </div>
        <span class="line-result-pill ${result}" style="flex-shrink:0">${result}</span>
      </div>`;
  });
  // Attach picks to rendered nodes after inserting into DOM (deferred via timeout)
  setTimeout(() => {
    document.querySelectorAll('.line-history-row[data-pick-idx]').forEach(el => {
      el._linePick = _picks[parseInt(el.dataset.pickIdx)];
    });
  }, 0);
  if (!filtered.length) {
    html = `<div style="font-size:0.75rem;color:var(--muted);text-align:center;padding:16px 0">No ${dirFilter === 'all' ? '' : dirFilter + ' '}picks yet</div>`;
  }
  return html;
}

function filterLineHistory(dir) {
  if (!LINE_HIST_DATA) return;
  // Update active tab styling on the inline All/Over/Under tabs
  document.querySelectorAll('.line-hist-tab').forEach(btn => {
    const isActive = btn.dataset.dir === dir;
    btn.classList.toggle('active', isActive);
    btn.classList.remove('over', 'under');
    if (isActive && dir !== 'all') btn.classList.add(dir);
  });
  document.getElementById('lineHistoryList').innerHTML = renderLineHistoryRows(LINE_HIST_DATA.picks, dir);
}

function switchLineDir(dir) {
  LINE_DIR = dir;
  // Update sub-nav pill buttons
  document.querySelectorAll('.line-dir-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.dir === dir)
  );
  // Render the pick for the selected direction
  const pickCard = document.getElementById('linePickCard');
  const noMsg    = document.getElementById('lineNoPickMsg');
  if (pickCard) {
    const pick = dir === 'over' ? LINE_OVER_PICK : LINE_UNDER_PICK;
    if (pick) {
      pickCard.style.display = '';
      pickCard.innerHTML = renderLinePickCard(pick, true);
      if (noMsg) noMsg.style.display = 'none';
    } else {
      pickCard.style.display = 'none';
      if (noMsg) { noMsg.style.display = 'block'; noMsg.textContent = `No ${dir.toUpperCase()} pick today.`; }
    }
  }
  // Sync the inline history tabs and re-render history
  filterLineHistory(dir);
}
