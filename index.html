<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Oracle — NBA Draft Optimizer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="The Oracle">
  <meta name="application-name" content="The Oracle">
  <meta name="theme-color" content="#060a0f">
  <meta property="og:title" content="The Oracle — NBA Draft Optimizer">
  <meta property="og:description" content="AI-powered NBA draft optimizer for the Real Sports App with game script analysis and calibration feedback.">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060a0f;
      --surface: rgba(12, 18, 28, 0.85);
      --surface2: rgba(20, 30, 48, 0.6);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.14);
      --chalk: #4f8ef7;
      --chalk-glow: rgba(79,142,247,0.25);
      --upside: #f97316;
      --upside-glow: rgba(249,115,22,0.25);
      --muted: #64748b;
      --text: #e8edf5;
      --text-dim: #94a3b8;
      --green: #22c55e;
      --red: #f43f5e;
      --r: 14px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Court texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.018) 60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      top: -20%;  left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 0 16px 80px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 900; letter-spacing: 0.04em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--chalk);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 16px var(--chalk-glow);
    }
    .logo-sub {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      letter-spacing: 0.15em; display: block; margin-top: 1px;
    }

    .nav { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
    .nav-btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 6px 14px;
      border: none; background: transparent; color: var(--muted);
      border-radius: 7px; cursor: pointer; transition: all 0.2s;
    }
    .nav-btn.active { background: var(--chalk); color: #fff; box-shadow: 0 2px 8px var(--chalk-glow); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── CHALK/UPSIDE TABS ── */
    .mode-tabs {
      display: flex; gap: 6px; margin-bottom: 18px;
    }
    .mode-tab {
      flex: 1; padding: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--muted);
      cursor: pointer; transition: all 0.25s;
    }
    .mode-tab.active[data-t="chalk"] { background: rgba(79,142,247,0.12); border-color: var(--chalk); color: var(--chalk); }
    .mode-tab.active[data-t="upside"] { background: rgba(249,115,22,0.12); border-color: var(--upside); color: var(--upside); }

    /* ── PLAYER CARD ── */
    .player-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 16px 16px 20px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .player-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Left colored accent bar */
    .player-card::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px;
      background: var(--tcolor, var(--chalk));
      border-radius: 0 3px 3px 0;
      box-shadow: 2px 0 12px var(--tcolor, var(--chalk));
    }

    /* Subtle team color bg wash */
    .player-card::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 50%, var(--tcolor-alpha, rgba(79,142,247,0.04)) 0%, transparent 60%);
      pointer-events: none;
    }

    .rank-badge {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      color: var(--tcolor, var(--chalk));
      flex-shrink: 0;
      position: relative; z-index: 1;
    }

    .player-info { position: relative; z-index: 1; min-width: 0; }
    .player-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 3px; display: flex; align-items: center; gap: 6px;
    }
    .pos-pill {
      background: var(--border-bright); border-radius: 3px;
      padding: 1px 5px; font-size: 0.6rem;
    }
    .injury-badge {
      background: rgba(244,63,94,0.15); color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.3); border-radius: 3px;
      padding: 1px 5px; font-size: 0.55rem; font-weight: 800;
      letter-spacing: 0.08em;
    }
    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 800; line-height: 1;
      color: #fff; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Stat pills row */
    .stat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      font-size: 0.68rem; font-weight: 600; color: var(--text-dim);
      display: flex; align-items: center; gap: 3px;
    }
    .stat-pill b { color: var(--text); font-weight: 700; }
    .stat-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--tcolor, var(--chalk)); opacity: 0.5;
    }

    /* Score column */
    .score-col {
      text-align: right; position: relative; z-index: 1;
      border-left: 1px solid var(--border);
      padding-left: 14px; min-width: 72px;
    }
    .score-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 900; line-height: 1;
      color: var(--score-color, var(--chalk));
    }
    .score-label {
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 3px;
    }
    .slot-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      color: var(--score-color, var(--chalk));
      background: rgba(79,142,247,0.1);
      border: 1px solid rgba(79,142,247,0.2);
      border-radius: 4px; padding: 2px 6px;
      display: inline-block; margin-top: 4px;
    }

    /* ── MULT BADGES ── */
    .mult-badge {
      background: rgba(79,142,247,0.1); color: var(--chalk);
      border: 1px solid rgba(79,142,247,0.2);
      font-size: 0.6rem; padding: 2px 6px; border-radius: 4px;
    }

    /* ── SKELETON LOADING ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .skel-block {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skel-circle { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .skel-lines { flex: 1; }
    .skel-line { height: 10px; margin-bottom: 8px; }
    .skel-line.wide { width: 70%; }
    .skel-line.narrow { width: 40%; }
    .skel-score { width: 48px; height: 44px; }

    /* ── GAME SELECTOR ── */
    .game-select-wrap { position: relative; margin-bottom: 12px; }
    .game-select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 0.9rem;
    }
    select {
      width: 100%;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border-bright);
      padding: 14px 40px 14px 16px;
      border-radius: 12px;
      appearance: none;
      outline: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--chalk); }

    /* ── ANALYZE BUTTON ── */
    .analyze-btn {
      width: 100%;
      background: var(--chalk);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 15px;
      border-radius: 12px;
      border: none; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px var(--chalk-glow);
      margin-bottom: 24px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 24px var(--chalk-glow); }
    .analyze-btn:disabled { opacity: 0.35; filter: grayscale(0.5); transform: none; box-shadow: none; cursor: not-allowed; }
    .analyze-btn .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── GAME INFO CHIPS ── */
    .game-chips { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; color: var(--text-dim);
    }
    .chip b { color: var(--text); }

    .lock-chip {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22c55e;
      padding: 5px 10px; border-radius: 6px;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin: 28px 0;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }

    /* ── ERROR TOAST ── */
    .error-banner {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem; color: #fda4af;
      margin-bottom: 16px;
      display: none;
    }

    .hidden { display: none !important; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--bg); border: 1px solid var(--border-bright); border-radius: 16px;
      padding: 24px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 800;
      margin-bottom: 16px; color: var(--text);
    }
    .score-row {
      display: grid; grid-template-columns: 1fr 50px 70px; gap: 8px; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .score-row-name { font-size: 0.82rem; font-weight: 600; }
    .score-row-pred { font-size: 0.75rem; color: var(--muted); text-align: center; }
    .score-row input {
      background: var(--surface2); border: 1px solid var(--border-bright); border-radius: 8px;
      padding: 8px; color: var(--text); font-size: 0.85rem; font-weight: 600; text-align: center;
      outline: none; width: 100%;
    }
    .score-row input:focus { border-color: var(--chalk); }
    .score-row input.invalid { border-color: var(--red); }
    .score-row input[type="text"] {
      text-align: left; font-weight: 400;
    }
    .remove-row-btn {
      background: none; border: none; color: var(--text-dim);
      font-size: 1.2rem; cursor: pointer; padding: 0 4px;
      opacity: 0.3; transition: opacity 0.15s;
    }
    .remove-row-btn:hover { opacity: 1; color: var(--red); }
    .modal-cancel {
      flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--border-bright); color: var(--text-dim); }
    .modal-submit {
      flex: 2; padding: 10px; border-radius: 10px; border: none;
      background: var(--chalk); color: #fff; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.06em; transition: all 0.2s;
    }
    .modal-submit:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">🏀</div>
      <div>
        THE ORACLE
        <span class="logo-sub">NBA Draft Optimizer</span>
      </div>
    </div>
    <div id="predSavedChip" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);padding:4px 10px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:6px"></div>
  </header>

  <!-- ══ OPTIMIZER VIEW ══ -->
  <div id="viewOptimizer">

    <!-- Today's Top 5 (slate) -->
    <div class="section-label">Today's Top 5</div>
    <div id="slateChips" class="game-chips"></div>

    <div class="mode-tabs" id="slateTabs" style="display:none">
      <button class="mode-tab active" data-t="chalk" onclick="switchSlate('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchSlate('upside')">🚀 Moonshot</button>
    </div>

    <div id="slateList"></div>

    <div class="divider"></div>

    <!-- Game Picker -->
    <div class="section-label">Game Analysis</div>
    <div id="errorBanner" class="error-banner"></div>
    <div class="game-select-wrap">
      <select id="gameSel"><option value="">Loading games...</option></select>
    </div>
    <button class="analyze-btn" id="analyzeBtn" disabled onclick="runAnalysis()">
      Analyze Draft
    </button>

    <div class="mode-tabs" id="picksTabsWrap" style="display:none;">
      <button class="mode-tab active" data-t="chalk" onclick="switchPicksTab('chalk')">⚡ Starting 5</button>
      <button class="mode-tab" data-t="upside" onclick="switchPicksTab('upside')">🚀 Moonshot</button>
    </div>
    <div id="gameScriptBadge" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;text-align:center;padding:8px 14px;margin:8px 0 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px"></div>
    <div id="gameLockBadge" style="display:none;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;text-align:center;padding:6px 12px;margin-bottom:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px"></div>
    <div id="gameInjuryBadge" style="display:none;font-size:0.68rem;color:#fbbf24;padding:6px 12px;text-align:center;letter-spacing:0.3px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15);border-radius:8px;margin-bottom:14px"></div>
    <div id="picksList"></div>

    <div class="divider"></div>

    <!-- Upload Results -->
    <div class="section-label">Track Results</div>
    <button class="analyze-btn" style="background:var(--upside);box-shadow:0 4px 20px var(--upside-glow)" onclick="openUploadModal()">
      Upload Draft Results
    </button>
    <div id="uploadStatus" style="display:none;font-size:0.75rem;color:var(--green);text-align:center;margin-top:-16px;margin-bottom:16px"></div>

  </div>

  <!-- ══ SCREENSHOT UPLOAD MODAL ══ -->
  <div class="modal-overlay hidden" id="uploadModal">
    <div class="modal-box">
      <div class="modal-header">Upload Draft Results</div>
      <p style="font-size:0.78rem;color:var(--text-dim);margin-bottom:14px;line-height:1.5">
        Upload a screenshot of your Daily Draft Stats from the Real Sports app. The AI will extract player data automatically.
      </p>

      <!-- Step 1: Upload -->
      <div id="uploadStep1">
        <div id="uploadPreview" style="display:none;margin-bottom:12px">
          <img id="uploadImg" style="width:100%;border-radius:8px;border:1px solid var(--border)">
        </div>
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;padding:24px;border:2px dashed var(--border-bright);border-radius:12px;color:var(--text-dim);font-size:0.85rem;transition:border-color 0.2s;margin-bottom:14px"
               onmouseover="this.style.borderColor='var(--chalk)'" onmouseout="this.style.borderColor='var(--border-bright)'">
          <input type="file" accept="image/*" id="uploadFileInput" style="display:none" onchange="handleUploadFile(this)">
          Select screenshot
        </label>
        <button class="modal-submit" id="parseBtn" disabled onclick="parseScreenshot()" style="width:100%">Parse Screenshot</button>
      </div>

      <!-- Step 2: Review parsed data -->
      <div id="uploadStep2" style="display:none">
        <div id="parsedResults"></div>
        <div id="parseError" style="color:var(--red);font-size:0.75rem;margin:8px 0;display:none"></div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="modal-cancel" onclick="backToUpload()">Back</button>
          <button class="modal-submit" id="saveToGitBtn" onclick="saveActualsToGit()">Save to Git</button>
        </div>
      </div>

      <!-- Step 3: Success -->
      <div id="uploadStep3" style="display:none;text-align:center;padding:24px 0">
        <div style="font-size:2rem;margin-bottom:12px">&#10003;</div>
        <div style="font-size:0.9rem;font-weight:600;color:var(--green);margin-bottom:8px">Results saved to Git!</div>
        <div id="savedFilePath" style="font-size:0.72rem;color:var(--text-dim)"></div>
      </div>

      <button class="modal-cancel" onclick="closeUploadModal()" style="width:100%;margin-top:14px">Close</button>
    </div>
  </div>

</div>

<script>
const TEAM_COLORS = {
  ATL:"#e03a3e",BOS:"#007A33",BKN:"#aaaaaa",CHA:"#00788c",CHI:"#ce1141",
  CLE:"#860038",DAL:"#00538c",DEN:"#fdb927",DET:"#c8102E",GSW:"#1d428a",
  HOU:"#ce1141",IND:"#fdbb30",LAC:"#c8102E",LAL:"#fdb927",MEM:"#5d76a9",
  MIA:"#98002E",MIL:"#00471B",MIN:"#0c2340",NOP:"#85714d",NYK:"#f58426",
  OKC:"#007ac1",ORL:"#0077c0",PHI:"#006bb6",PHX:"#e56020",POR:"#E03A3E",
  SAC:"#5a2d81",SAS:"#c4ced4",TOR:"#ce1141",UTA:"#f9a01b",WAS:"#002B5C"
};

let SLATE = null;
let PICKS_DATA = null;
let CURRENT_SLATE_TAB = 'chalk';
let PARSED_PLAYERS = null;  // parsed screenshot data awaiting confirmation

// ── INIT ──
(async function init() {
  loadSlate();
  initGameSelector();
})();

async function initGameSelector() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  try {
    const r = await fetch('/api/games');
    const games = await r.json();
    if (!games.length) {
      sel.innerHTML = '<option value="">No games today</option>';
      return;
    }
    sel.innerHTML = '<option value="">Select a game...</option>';
    games.forEach(g => {
      const o = document.createElement('option');
      o.value = g.gameId;
      let label = g.label + (g.total ? ` \u00B7 O/U ${g.total}` : '');
      if (g.startTime) {
        const start = new Date(g.startTime);
        const timeStr = start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        label += ` \u00B7 ${timeStr}`;
      }
      if (g.locked) label += ' \uD83D\uDD12';
      o.textContent = label;
      sel.appendChild(o);
    });
    sel.onchange = () => { btn.disabled = !sel.value; };
  } catch(e) {
    sel.innerHTML = '<option value="">Offline — check backend</option>';
  }
}

// ── SLATE ──
async function loadSlate() {
  renderSkeletons('slateList', 5);
  try {
    const r = await fetch('/api/slate');
    if (!r.ok) throw new Error('Slate fetch failed');
    const slateData = await r.json();
    if (slateData.locked && !slateData.lineups.chalk.length && SLATE) {
      SLATE.locked = true;
    } else {
      SLATE = slateData;
    }
    document.getElementById('slateTabs').style.display = 'flex';

    const chips = document.getElementById('slateChips');
    const slateDate = SLATE.date ? new Date(SLATE.date + 'T12:00:00') : new Date();
    const dateStr = slateDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
    let lockChip = '';
    if (SLATE.locked) {
      lockChip = '<div class="lock-chip">Picks Locked</div>';
    }
    const gameCount = SLATE.draftable_count ?? SLATE.games.length;
    chips.innerHTML = `
      <div class="chip"><b>${gameCount}</b> Games</div>
      <div class="chip">${dateStr}</div>
      ${lockChip}
    `;
    switchSlate('chalk');

    // Auto-save predictions to GitHub
    savePredictions();
  } catch(e) {
    document.getElementById('slateList').innerHTML = `
      <div class="empty-state">
        <span class="icon">📡</span>
        <p>Couldn't load today's slate.<br>Make sure the API server is running.</p>
      </div>`;
  }
}

function switchPicksTab(tab) {
  document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (PICKS_DATA) renderCards(PICKS_DATA.lineups[tab] || [], 'picksList', tab);
}

function switchSlate(tab) {
  CURRENT_SLATE_TAB = tab;
  document.querySelectorAll('#slateTabs .mode-tab').forEach(t => t.classList.toggle('active', t.dataset.t === tab));
  if (SLATE) renderCards(SLATE.lineups[tab] || [], 'slateList', tab);
}

// ── ANALYSIS ──
async function runAnalysis() {
  const sel = document.getElementById('gameSel');
  const btn = document.getElementById('analyzeBtn');
  const banner = document.getElementById('errorBanner');
  const gameId = sel.value;
  if (!gameId) return;

  banner.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  renderSkeletons('picksList', 5);

  try {
    const r = await fetch(`/api/picks?gameId=${gameId}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Server error' }));
      throw new Error(err.error || `HTTP ${r.status}`);
    }
    const picksData = await r.json();
    // If locked with empty lineups (cold start after lock), keep existing data
    if (picksData.locked && !picksData.lineups.chalk.length && PICKS_DATA) {
      PICKS_DATA.locked = true;
    } else {
      PICKS_DATA = picksData;
    }
    document.getElementById('picksTabsWrap').style.display = 'flex';
    // Reset tab state to Starting 5
    document.querySelectorAll('#picksTabsWrap .mode-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.t === 'chalk'));
    // Show game script badge
    const badge = document.getElementById('gameScriptBadge');
    if (PICKS_DATA.gameScript) {
      const total = PICKS_DATA.game?.total;
      badge.innerHTML = `Game Script: <b>${PICKS_DATA.gameScript}</b>${total ? ` (O/U ${total})` : ''}`;
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
    // Show lock status
    const lockBadge = document.getElementById('gameLockBadge');
    if (PICKS_DATA.locked) {
      lockBadge.innerHTML = 'Picks locked — showing final predictions';
      lockBadge.style.display = 'block';
      lockBadge.style.color = '#22c55e';
    } else {
      lockBadge.style.display = 'none';
    }
    // Show injury info
    const injBadge = document.getElementById('gameInjuryBadge');
    const injuries = PICKS_DATA.injuries || [];
    if (injuries.length > 0) {
      const names = injuries.map(inj => `${inj.name} (${inj.team})`).join(', ');
      injBadge.innerHTML = `<b>${injuries.length} OUT</b>: ${names}`;
      injBadge.style.display = 'block';
    } else {
      injBadge.style.display = 'none';
    }
    renderCards(PICKS_DATA.lineups.chalk, 'picksList', 'chalk');

    // Auto-save predictions to GitHub (includes this game now)
    savePredictions();
  } catch(e) {
    document.getElementById('picksList').innerHTML = '';
    banner.textContent = `⚠ ${e.message}`;
    banner.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze Draft';
  }
}

// ── RENDER CARDS ──
function renderCards(picks, containerId, mode) {
  const el = document.getElementById(containerId);
  if (!picks || !picks.length) {
    const msg = SLATE?.no_games_yet
      ? `Today's slate will be available around <b>${SLATE.available_after}</b>.`
      : 'No players to display yet.';
    el.innerHTML = `<div class="empty-state"><span class="icon">🏀</span><p>${msg}</p></div>`;
    return;
  }

  const isUpside = mode === 'upside';
  const scoreColor = isUpside ? 'var(--upside)' : 'var(--chalk)';

  el.innerHTML = picks.map((p, i) => {
    const tc = TEAM_COLORS[p.team] || '#4f8ef7';
    const tcAlpha = tc.replace('#', '').match(/.{2}/g)
      ? `rgba(${parseInt(tc.slice(1,3),16)},${parseInt(tc.slice(3,5),16)},${parseInt(tc.slice(5,7),16)},0.08)`
      : 'rgba(79,142,247,0.08)';

    const multBadge = p.est_mult ? `<span class="mult-badge">+${p.est_mult}x card</span>` : '';

    const statsHtml = [
      multBadge,
      p.predMin && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.predMin}</b> min</div>`,
      p.pts      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.pts}</b> pts</div>`,
      p.reb      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.reb}</b> reb</div>`,
      p.ast      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.ast}</b> ast</div>`,
      p.stl      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.stl}</b> stl</div>`,
      p.blk      && `<div class="stat-pill"><div class="stat-dot"></div><b>${p.blk}</b> blk</div>`,
      (p._decline && p._decline < 0.85) && `<div class="stat-pill" style="color:#f43f5e"><b>↓${Math.round((1-p._decline)*100)}%</b> usage</div>`,
    ].filter(Boolean).join('');

    return `
      <div class="player-card" style="--tcolor:${tc};--tcolor-alpha:${tcAlpha};animation-delay:${i*0.06}s">
        <div class="rank-badge">${p.slot}</div>
        <div class="player-info">
          <div class="player-meta">
            ${p.team || '—'} <span class="pos-pill">${p.pos}</span>${p.injury_status ? ` <span class="injury-badge">${p.injury_status}</span>` : ''}
          </div>
          <div class="player-name">${p.name}</div>
          <div class="stat-pills">${statsHtml}</div>
        </div>
        <div class="score-col" style="--score-color:${scoreColor}">
          <div class="score-num">${p.rating}</div>
          <span class="score-label">${isUpside ? 'moonshot' : 'projected'}</span>
          <div class="slot-badge" style="background:${isUpside?'rgba(249,115,22,0.1)':'rgba(79,142,247,0.1)'};border-color:${isUpside?'rgba(249,115,22,0.25)':'rgba(79,142,247,0.25)'}">
            ${p.slot}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── SKELETON ──
function renderSkeletons(containerId, count) {
  document.getElementById(containerId).innerHTML = Array.from({length: count}, (_, i) => `
    <div class="skeleton" style="animation-delay:${i*0.07}s">
      <div class="skel-block skel-circle"></div>
      <div class="skel-lines">
        <div class="skel-block skel-line wide"></div>
        <div class="skel-block skel-line narrow"></div>
      </div>
      <div class="skel-block skel-score"></div>
    </div>`).join('');
}

// ── SAVE PREDICTIONS TO GIT ──
async function savePredictions() {
  try {
    const r = await fetch('/api/save-predictions', { method: 'POST' });
    if (r.ok) {
      const result = await r.json();
      const chip = document.getElementById('predSavedChip');
      chip.textContent = `Saved ${result.rows} predictions`;
      chip.style.display = 'inline-block';
      setTimeout(() => { chip.style.display = 'none'; }, 4000);
    }
  } catch(e) {
    console.warn('Prediction save failed:', e);
  }
}

// ── SCREENSHOT UPLOAD FLOW ──
function openUploadModal() {
  PARSED_PLAYERS = null;
  document.getElementById('uploadStep1').style.display = 'block';
  document.getElementById('uploadStep2').style.display = 'none';
  document.getElementById('uploadStep3').style.display = 'none';
  document.getElementById('uploadPreview').style.display = 'none';
  document.getElementById('uploadFileInput').value = '';
  document.getElementById('parseBtn').disabled = true;
  document.getElementById('uploadModal').classList.remove('hidden');
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.add('hidden');
}

function handleUploadFile(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('uploadImg').src = e.target.result;
      document.getElementById('uploadPreview').style.display = 'block';
      document.getElementById('parseBtn').disabled = false;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function parseScreenshot() {
  const btn = document.getElementById('parseBtn');
  const file = document.getElementById('uploadFileInput').files[0];
  if (!file) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Parsing...';

  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/parse-screenshot', { method: 'POST', body: form });
    const data = await r.json();

    if (!r.ok) throw new Error(data.error || 'Parse failed');
    if (!data.players || !data.players.length) throw new Error('No players found in screenshot');

    PARSED_PLAYERS = data.players;
    renderParsedResults(PARSED_PLAYERS);
    document.getElementById('uploadStep1').style.display = 'none';
    document.getElementById('uploadStep2').style.display = 'block';
  } catch(e) {
    const err = document.getElementById('parseError');
    err.textContent = e.message;
    err.style.display = 'block';
    document.getElementById('uploadStep2').style.display = 'block';
    document.getElementById('uploadStep1').style.display = 'none';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Parse Screenshot';
  }
}

function renderParsedResults(players) {
  const el = document.getElementById('parsedResults');
  let html = '<div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:10px">Review parsed data — edit any incorrect values:</div>';

  players.forEach((p, i) => {
    const src = p.source === 'my_draft' ? 'My Draft' : p.source === 'highest_value' ? 'Top Value' : p.source || '';
    html += `
      <div class="score-row" style="grid-template-columns:1fr 55px 55px 55px;gap:6px">
        <input type="text" value="${p.player_name || ''}" id="pName_${i}" style="font-size:0.78rem">
        <input type="number" value="${p.actual_rs ?? ''}" id="pRS_${i}" placeholder="RS" step="0.1" style="font-size:0.78rem">
        <input type="number" value="${p.actual_card_boost ?? ''}" id="pBoost_${i}" placeholder="Boost" step="0.1" style="font-size:0.78rem">
        <input type="number" value="${p.drafts ?? ''}" id="pDrafts_${i}" placeholder="Drafts" style="font-size:0.78rem">
      </div>`;
  });

  el.innerHTML = html;
}

function backToUpload() {
  document.getElementById('uploadStep1').style.display = 'block';
  document.getElementById('uploadStep2').style.display = 'none';
  document.getElementById('parseError').style.display = 'none';
}

async function saveActualsToGit() {
  const btn = document.getElementById('saveToGitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Saving...';

  // Collect edited data from form
  const players = [];
  if (PARSED_PLAYERS) {
    PARSED_PLAYERS.forEach((p, i) => {
      const name = document.getElementById(`pName_${i}`)?.value?.trim();
      const rs = document.getElementById(`pRS_${i}`)?.value;
      const boost = document.getElementById(`pBoost_${i}`)?.value;
      const drafts = document.getElementById(`pDrafts_${i}`)?.value;
      if (!name) return;
      players.push({
        player_name: name,
        actual_rs: rs ? parseFloat(rs) : '',
        actual_card_boost: boost ? parseFloat(boost) : '',
        drafts: drafts ? parseInt(drafts) : '',
        avg_finish: p.avg_finish || '',
        total_value: p.total_value || '',
        source: p.source || '',
      });
    });
  }

  if (!players.length) {
    btn.disabled = false;
    btn.innerHTML = 'Save to Git';
    return;
  }

  try {
    const r = await fetch('/api/save-actuals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ players }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Save failed');

    document.getElementById('uploadStep2').style.display = 'none';
    document.getElementById('uploadStep3').style.display = 'block';
    document.getElementById('savedFilePath').textContent = data.path;

    const status = document.getElementById('uploadStatus');
    status.textContent = `Results saved: ${data.path}`;
    status.style.display = 'block';
  } catch(e) {
    const err = document.getElementById('parseError');
    err.textContent = e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save to Git';
  }
}
</script>
